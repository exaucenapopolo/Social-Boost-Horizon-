<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <meta name="description" content="Historique des commandes avancées · Social Boost Horizon" />
  <title>Historique avancé · Social Boost Horizon</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />

  <style>
    :root {
      --adv-bg: #0C0C1D;
      --adv-surface: #141428;
      --adv-surface-2: #1C1C3A;
      --adv-border: rgba(255, 165, 0, 0.15);
      --adv-primary: #FF8C00;
      --adv-primary-light: #FFA940;
      --adv-secondary: #10B981;
      --adv-accent: #F43F5E;
      --adv-gold: #F59E0B;
      --adv-text: #F1F5F9;
      --adv-text-dim: rgba(241, 245, 249, 0.6);
      --adv-text-muted: rgba(241, 245, 249, 0.4);
      --adv-glow: rgba(255, 140, 0, 0.4);
      --font-heading: 'Space Grotesk', sans-serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 14px; scroll-behavior: smooth; }
    @media (min-width: 768px) { html { font-size: 15px; } }

    body {
      font-family: var(--font-body);
      color: var(--adv-text);
      background: var(--adv-bg);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    .mesh-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
      background:
        radial-gradient(ellipse at 10% 20%, rgba(255, 140, 0, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 80%, rgba(16, 185, 129, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(244, 63, 94, 0.04) 0%, transparent 60%),
        var(--adv-bg);
    }
    .mesh-bg .grid-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-image:
        linear-gradient(rgba(255,140,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,140,0,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridShift 20s linear infinite;
    }
    @keyframes gridShift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(60px, 60px); }
    }

    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: -1;
    }
    .orb-1 {
      width: 300px; height: 300px; background: rgba(255, 140, 0, 0.1);
      top: 10%; left: -5%; animation: orbFloat 12s ease-in-out infinite;
    }
    .orb-2 {
      width: 250px; height: 250px; background: rgba(16, 185, 129, 0.08);
      bottom: 10%; right: -5%; animation: orbFloat 16s ease-in-out infinite reverse;
    }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(40px, -40px); }
    }

    h1, h2, h3 { font-family: var(--font-heading); color: var(--adv-text); }

    /* Header */
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 20px;
      background: linear-gradient(135deg, var(--adv-surface), var(--adv-surface-2));
      border-bottom: 1px solid var(--adv-border);
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(20px);
    }
    .top-bar .logo-link {
      display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--adv-text);
    }
    .top-bar .logo-link .logo-img {
      width: 38px; height: 38px; border-radius: 10px; object-fit: cover;
    }
    .top-bar .logo-title {
      font-family: var(--font-heading); font-size: 1rem; font-weight: 700;
    }
    .top-bar .logo-title span { color: var(--adv-primary); }
    .top-bar .nav-btn {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255, 140, 0, 0.1); border: 1px solid rgba(255, 140, 0, 0.25);
      border-radius: 25px; padding: 6px 14px; font-size: 0.8rem; font-weight: 600;
      color: var(--adv-text); text-decoration: none; transition: all 0.3s ease;
    }
    .top-bar .nav-btn:hover {
      background: rgba(255, 140, 0, 0.2); transform: translateY(-1px);
    }
    .top-bar .nav-btn i { color: var(--adv-gold); font-size: 0.85rem; }
    .top-bar .header-right {
      display: flex; align-items: center; gap: 10px;
    }
    .balance-chip {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255, 140, 0, 0.1); border: 1px solid rgba(255, 140, 0, 0.25);
      border-radius: 25px; padding: 6px 14px; font-size: 0.85rem; font-weight: 600;
    }
    .balance-chip i { color: var(--adv-gold); }

    /* Main */
    main { flex: 1; max-width: 1200px; margin: 0 auto; padding: 30px 20px 40px; width: 100%; }

    .page-title { text-align: center; margin-bottom: 30px; }
    .page-title h1 { font-size: 2rem; background: linear-gradient(135deg, var(--adv-primary), var(--adv-gold), var(--adv-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; display: inline-block; }
    .page-title h1 i { -webkit-text-fill-color: var(--adv-primary); margin-right: 10px; }

    /* Stats */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px; margin-bottom: 25px;
    }
    .stat-card {
      background: var(--adv-surface); border: 1px solid var(--adv-border);
      border-radius: 20px; padding: 20px; text-align: center;
      transition: all 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
    .stat-card:hover { transform: translateY(-4px); border-color: var(--adv-primary); }
    .stat-card i { font-size: 1.5rem; margin-bottom: 8px; }
    .stat-value { font-size: 1.8rem; font-weight: 700; font-family: var(--font-heading); }
    .stat-label { font-size: 0.8rem; color: var(--adv-text-dim); }

    /* Controls */
    .controls-bar {
      display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
      margin-bottom: 25px; justify-content: space-between;
    }
    .filters { display: flex; flex-wrap: wrap; gap: 8px; }
    .filter-btn {
      background: rgba(255,255,255,0.05); border: 1px solid var(--adv-border);
      color: var(--adv-text-dim); padding: 8px 16px; border-radius: 20px;
      cursor: pointer; font-weight: 500; font-size: 0.85rem; transition: 0.3s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: rgba(255, 140, 0, 0.15); border-color: var(--adv-primary);
      color: #fff;
    }
    .control-group {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .control-group select {
      background: var(--adv-surface); border: 1px solid var(--adv-border);
      color: var(--adv-text); padding: 8px 12px; border-radius: 10px;
      font-size: 0.85rem; cursor: pointer; font-family: var(--font-body);
      outline: none;
    }
    .control-group select:focus { border-color: var(--adv-primary); }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, var(--adv-primary), var(--adv-accent));
      color: #fff; padding: 10px 20px; border: none; border-radius: 50px;
      font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 0.9rem;
      text-decoration: none; box-shadow: 0 4px 15px rgba(255, 140, 0, 0.3);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 140, 0, 0.5); }
    .btn-gold {
      background: linear-gradient(135deg, #B8860B, var(--adv-gold));
      color: #0C0C1D; box-shadow: 0 4px 15px rgba(212,175,55,0.3);
    }
    .btn-gold:hover { box-shadow: 0 8px 25px rgba(212,175,55,0.5); }

    /* Orders list */
    .orders-list { display: flex; flex-direction: column; gap: 12px; }

    .order-card {
      background: var(--adv-surface); border: 1px solid var(--adv-border);
      border-radius: 20px; padding: 20px; transition: all 0.3s;
      cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
    .order-card:hover { border-color: var(--adv-primary); transform: translateY(-2px); }
    .order-card-header {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 10px;
    }
    .order-id {
      font-weight: 700; font-size: 1.15rem; color: var(--adv-gold);
      font-family: var(--font-heading);
      text-shadow: 0 2px 10px rgba(245, 158, 11, 0.3);
    }
    .order-meta {
      display: flex; align-items: center; gap: 15px; flex-wrap: wrap;
      font-size: 0.85rem; color: var(--adv-text-dim);
    }
    .platform-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.06); padding: 5px 12px;
      border-radius: 20px; font-weight: 600; color: #fff;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .order-status-badge {
      padding: 5px 12px; border-radius: 20px; font-size: 0.75rem;
      font-weight: 700; text-transform: uppercase;
    }
    .status-completed { background: rgba(16, 185, 129, 0.2); color: var(--adv-secondary); border: 1px solid rgba(16,185,129,0.3); }
    .status-processing { background: rgba(255, 184, 0, 0.2); color: #FFB800; border: 1px solid rgba(255,184,0,0.3); }
    .status-pending { background: rgba(255, 152, 0, 0.2); color: #FF9800; border: 1px solid rgba(255,152,0,0.3); }
    .status-cancelled { background: rgba(244, 63, 94, 0.2); color: var(--adv-accent); border: 1px solid rgba(244,63,94,0.3); }
    .status-partial { background: rgba(139, 92, 246, 0.2); color: #8B5CF6; border: 1px solid rgba(139,92,246,0.3); }

    .progress-bar-container {
      display: flex; align-items: center; gap: 10px; margin-top: 15px;
    }
    .progress-bar {
      flex: 1; height: 8px; background: rgba(255,255,255,0.08);
      border-radius: 10px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 10px; transition: width 0.5s ease;
      background: linear-gradient(90deg, var(--adv-primary), var(--adv-gold));
    }
    .progress-percent { font-weight: 700; font-size: 0.9rem; min-width: 45px; text-align: right; font-family: var(--font-heading); }

    .order-details {
      display: none; margin-top: 20px; padding-top: 15px;
      border-top: 1px solid var(--adv-border);
      animation: fadeSlide 0.3s ease;
    }
    .order-details.open { display: block; }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .details-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px; margin-bottom: 15px;
    }
    .detail-item {
      background: rgba(255,255,255,0.03); border-radius: 12px; padding: 12px;
      position: relative;
    }
    .detail-label {
      font-size: 0.7rem; color: var(--adv-text-dim); text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 4px;
    }
    .detail-value {
      font-weight: 500; font-size: 0.9rem; word-break: break-word;
      display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
    }
    .detail-value a { color: var(--adv-primary); text-decoration: none; }
    .detail-value a:hover { text-decoration: underline; }

    .copy-btn {
      background: none; border: none; color: var(--adv-text-dim);
      cursor: pointer; padding: 2px 5px; font-size: 0.8rem;
      opacity: 0.6; transition: 0.2s; display: inline-flex; align-items: center;
    }
    .copy-btn:hover { opacity: 1; color: var(--adv-gold); }
    .copied-tooltip {
      position: absolute; top: -25px; right: 0;
      background: var(--adv-gold); color: #000; font-size: 0.7rem;
      padding: 2px 8px; border-radius: 10px; pointer-events: none;
      opacity: 0; transition: opacity 0.2s;
    }

    .comments-section {
      background: rgba(16, 185, 129, 0.05);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 12px; padding: 12px; margin-top: 12px;
    }
    .comments-title {
      font-weight: 600; color: var(--adv-secondary);
      margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
    }
    .comments-content { font-style: italic; color: var(--adv-text-dim); font-size: 0.9rem; }

    .share-section {
      margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--adv-border);
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    }
    .share-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: #fff; padding: 10px 18px; border: none; border-radius: 50px;
      cursor: pointer; font-weight: 600; font-size: 0.85rem;
      transition: 0.3s; box-shadow: 0 4px 15px rgba(37,211,102,0.3);
    }
    .share-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37,211,102,0.5); }
    .share-btn.facebook {
      background: linear-gradient(135deg, #1877F2, #0C5DC7);
      box-shadow: 0 4px 15px rgba(24,119,242,0.3);
    }
    .share-btn.copy-share {
      background: linear-gradient(135deg, var(--adv-primary), var(--adv-accent));
      box-shadow: 0 4px 15px rgba(255,140,0,0.3);
    }

    .afb-actions {
      display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px;
    }
    .afb-btn {
      padding: 8px 16px; border: none; border-radius: 8px;
      cursor: pointer; font-weight: 600; font-size: 0.8rem;
      display: flex; align-items: center; gap: 6px; transition: 0.3s;
      color: #fff;
    }
    .afb-btn:hover { transform: translateY(-2px); }
    .afb-btn.status { background: linear-gradient(135deg, #8B5CF6, #7C3AED); }
    .afb-btn.refill { background: linear-gradient(135deg, #10B981, #059669); }
    .afb-btn.cancel { background: linear-gradient(135deg, #EF4444, #DC2626); }

    .load-more { text-align: center; margin-top: 20px; }

    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px); z-index: 1000;
      justify-content: center; align-items: center; padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: linear-gradient(135deg, var(--adv-surface), var(--adv-surface-2));
      border: 1px solid var(--adv-gold); border-radius: 24px;
      padding: 30px; max-width: 450px; width: 100%;
      animation: modalIn 0.3s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-box h3 {
      color: var(--adv-gold); margin-bottom: 20px;
      text-align: center; display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .modal-option {
      background: rgba(255,255,255,0.05); border: 1px solid var(--adv-border);
      border-radius: 14px; padding: 16px 18px; margin-bottom: 10px;
      cursor: pointer; transition: 0.3s; display: flex;
      align-items: center; gap: 15px; text-decoration: none; color: #fff;
    }
    .modal-option:hover {
      background: rgba(212,175,55,0.1); border-color: var(--adv-gold);
      transform: translateX(5px);
    }
    .modal-option i { font-size: 1.5rem; color: var(--adv-gold); width: 30px; text-align: center; }
    .modal-option .option-text h4 { margin: 0; font-size: 1rem; }
    .modal-option .option-text p { margin: 2px 0 0; font-size: 0.8rem; color: var(--adv-text-dim); }
    .modal-close-btn {
      display: block; width: 100%; margin-top: 15px;
      background: transparent; border: 1px solid rgba(255,255,255,0.2);
      color: #fff; padding: 10px; border-radius: 50px;
      cursor: pointer; font-weight: 600; transition: 0.3s;
    }
    .modal-close-btn:hover { background: rgba(255,255,255,0.05); }

    footer {
      background: rgba(8,14,26,0.9); border-top: 1px solid var(--adv-border);
      padding: 18px; text-align: center; font-size: 0.8rem;
      color: var(--adv-text-dim); margin-top: auto;
    }

    /* Notifications */
    .notify-toast {
      position: fixed; top: 20px; right: 20px; z-index: 2000;
      padding: 14px 20px; border-radius: 12px; max-width: 350px;
      font-size: 0.85rem; font-weight: 500; color: white;
      transform: translateX(120%); transition: transform 0.4s ease;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }
    .notify-toast.show { transform: translateX(0); }
    .notify-toast.success { background: linear-gradient(135deg, #10B981, #059669); }
    .notify-toast.error { background: linear-gradient(135deg, #EF4444, #DC2626); }
    .notify-toast.info { background: linear-gradient(135deg, var(--adv-primary), var(--adv-accent)); }

    @media (max-width: 600px) {
      .order-card { padding: 15px; }
      .details-grid { grid-template-columns: 1fr 1fr; }
      .share-section { flex-direction: column; align-items: stretch; }
      .share-btn { justify-content: center; }
      .top-bar { padding: 10px 14px; }
      .top-bar .logo-title { font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <div class="mesh-bg"><div class="grid-overlay"></div></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="top-bar">
    <a href="dashboard.html" class="logo-link">
      <img src="https://raw.githubusercontent.com/exaucenapopolo/Social-Boost-Horizon-/refs/heads/main/assets/logos/Logo%20social%20Boost%20horizon.jpg" alt="Logo" class="logo-img">
      <div class="logo-title"><span>Historique</span> Avancé</div>
    </a>
    <div class="header-right">
      <a href="commande-avancee.html" class="nav-btn">
        <i class="fas fa-plus-circle"></i>
        <span>Commander</span>
      </a>
      <div class="balance-chip">
        <i class="fas fa-wallet"></i>
        <span id="userBalance">-- FCFA</span>
      </div>
    </div>
  </div>

  <main>
    <div class="page-title" data-aos="fade-up">
      <h1><i class="fas fa-clock-rotate-left"></i>Historique des commandes avancées</h1>
    </div>

    <div class="stats-grid" data-aos="fade-up" data-aos-delay="100">
      <div class="stat-card"><i class="fas fa-shopping-cart" style="color:var(--adv-primary);"></i><div class="stat-value" id="totalOrders">0</div><div class="stat-label">Total commandes</div></div>
      <div class="stat-card"><i class="fas fa-check-circle" style="color:var(--adv-secondary);"></i><div class="stat-value" id="completedOrders">0</div><div class="stat-label">Terminées</div></div>
      <div class="stat-card"><i class="fas fa-sync-alt" style="color:#FFB800;"></i><div class="stat-value" id="processingOrders">0</div><div class="stat-label">En cours</div></div>
      <div class="stat-card"><i class="fas fa-clock" style="color:#FF9800;"></i><div class="stat-value" id="pendingOrders">0</div><div class="stat-label">En attente</div></div>
      <div class="stat-card"><i class="fas fa-times-circle" style="color:var(--adv-accent);"></i><div class="stat-value" id="cancelledOrders">0</div><div class="stat-label">Annulées/Partielles</div></div>
      <div class="stat-card"><i class="fas fa-coins" style="color:var(--adv-gold);"></i><div class="stat-value" id="totalAmount">0</div><div class="stat-label">Total dépensé</div></div>
    </div>

    <div class="controls-bar" data-aos="fade-up">
      <div class="filters">
        <button class="filter-btn active" data-filter="all">Toutes</button>
        <button class="filter-btn" data-filter="completed">Terminées</button>
        <button class="filter-btn" data-filter="processing">En cours</button>
        <button class="filter-btn" data-filter="pending">En attente</button>
        <button class="filter-btn" data-filter="cancelled">Annulées/Partielles</button>
      </div>
      <div class="control-group">
        <select id="sortSelect">
          <option value="date-desc">Date (récent → ancien)</option>
          <option value="date-asc">Date (ancien → récent)</option>
          <option value="amount-desc">Montant (élevé → faible)</option>
          <option value="amount-asc">Montant (faible → élevé)</option>
          <option value="status">Statut</option>
        </select>
        <select id="currencySelect">
          <option value="CM">Cameroun (FCFA)</option>
          <option value="SN">Sénégal (FCFA)</option>
          <option value="CI">Côte d'Ivoire (FCFA)</option>
          <option value="BF">Burkina (FCFA)</option>
          <option value="ML">Mali (FCFA)</option>
          <option value="BJ">Bénin (FCFA)</option>
          <option value="TG">Togo (FCFA)</option>
          <option value="NE">Niger (FCFA)</option>
          <option value="GA">Gabon (FCFA)</option>
          <option value="CG">Congo (FCFA)</option>
          <option value="CD">RD Congo (CDF)</option>
          <option value="GH">Ghana (GHS)</option>
          <option value="NG">Nigeria (NGN)</option>
          <option value="KE">Kenya (KES)</option>
          <option value="UG">Ouganda (UGX)</option>
          <option value="TZ">Tanzanie (TZS)</option>
          <option value="RW">Rwanda (RWF)</option>
          <option value="ZM">Zambie (ZMW)</option>
        </select>
        <select id="limitSelect">
          <option value="10">10 par page</option>
          <option value="15">15</option>
          <option value="20">20</option>
          <option value="30">30</option>
          <option value="50" selected>50</option>
        </select>
        <button id="refreshBtn" class="btn"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
      </div>
    </div>

    <div class="orders-list" id="ordersList" data-aos="fade-up" data-aos-delay="200">
      <div style="text-align:center;padding:40px;">
        <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:var(--adv-primary);"></i>
        <p style="margin-top:10px;color:var(--adv-text-dim);">Chargement...</p>
      </div>
    </div>

    <div class="load-more" id="loadMoreContainer" style="display:none;">
      <button id="loadMoreBtn" class="btn btn-gold"><i class="fas fa-chevron-down"></i> Voir plus</button>
    </div>
  </main>

  <footer>
    <p>© 2026 Social Boost Horizon · Historique avancé · Tous droits réservés.</p>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      if (typeof AOS !== 'undefined') AOS.init({ duration: 600, once: true, offset: 100 });

      const firebaseConfig = {
        apiKey: "AIzaSyD2JiDS0g8EkeNXxjO7_wGI3WznpPvcCCk",
        authDomain: "social-boost-horizon.firebaseapp.com",
        projectId: "social-boost-horizon",
        storageBucket: "social-boost-horizon.appspot.com",
        messagingSenderId: "43658165639",
        appId: "1:43658165639:web:b8f492dc6a25cd12fc6722"
      };
      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();

      const BACKEND_URL = ''; // si besoin, ajuster

      // Configuration devise
      const COUNTRIES_CONFIG = {
        CM: { currency: 'XAF', symbol: 'FCFA', rate: 1 },
        SN: { currency: 'XOF', symbol: 'FCFA', rate: 1 },
        CI: { currency: 'XOF', symbol: 'FCFA', rate: 1 },
        BF: { currency: 'XOF', symbol: 'FCFA', rate: 1 },
        ML: { currency: 'XOF', symbol: 'FCFA', rate: 1 },
        BJ: { currency: 'XOF', symbol: 'FCFA', rate: 1 },
        TG: { currency: 'XOF', symbol: 'FCFA', rate: 1 },
        NE: { currency: 'XOF', symbol: 'FCFA', rate: 1 },
        GA: { currency: 'XAF', symbol: 'FCFA', rate: 1 },
        CG: { currency: 'XAF', symbol: 'FCFA', rate: 1 },
        CD: { currency: 'CDF', symbol: 'CDF', rate: 4.35 },
        GH: { currency: 'GHS', symbol: 'GHS', rate: 0.025 },
        NG: { currency: 'NGN', symbol: 'NGN', rate: 2.65 },
        KE: { currency: 'KES', symbol: 'KES', rate: 0.22 },
        UG: { currency: 'UGX', symbol: 'UGX', rate: 6.25 },
        TZ: { currency: 'TZS', symbol: 'TZS', rate: 4.2 },
        RW: { currency: 'RWF', symbol: 'RWF', rate: 2.15 },
        ZM: { currency: 'ZMW', symbol: 'ZMW', rate: 0.045 }
      };
      let selectedCountry = 'CM';

      function convertFromXAF(amountXAF) {
        const config = COUNTRIES_CONFIG[selectedCountry];
        if (!config) return amountXAF;
        return Math.round(amountXAF * config.rate);
      }
      function getCurrencySymbol() {
        return COUNTRIES_CONFIG[selectedCountry]?.symbol || 'FCFA';
      }
      function formatAmount(amountXAF) {
        return `${convertFromXAF(amountXAF).toLocaleString('fr-FR')} ${getCurrencySymbol()}`;
      }

      // Éléments DOM
      const ordersList = document.getElementById('ordersList');
      const filterBtns = document.querySelectorAll('.filter-btn');
      const sortSelect = document.getElementById('sortSelect');
      const limitSelect = document.getElementById('limitSelect');
      const loadMoreBtn = document.getElementById('loadMoreBtn');
      const loadMoreContainer = document.getElementById('loadMoreContainer');
      const refreshBtn = document.getElementById('refreshBtn');
      const currencySelect = document.getElementById('currencySelect');

      const totalOrdersEl = document.getElementById('totalOrders');
      const completedOrdersEl = document.getElementById('completedOrders');
      const processingOrdersEl = document.getElementById('processingOrders');
      const pendingOrdersEl = document.getElementById('pendingOrders');
      const cancelledOrdersEl = document.getElementById('cancelledOrders');
      const totalAmountEl = document.getElementById('totalAmount');
      const userBalanceEl = document.getElementById('userBalance');

      let currentUid = null;
      let allOrders = [];
      let displayedOrders = [];
      let currentDisplayLimit = 50;
      let currentFilter = 'all';
      let currentSort = 'date-desc';
      let userBalanceXAF = 0;

      // Gestion devise
      if (currencySelect) {
        currencySelect.addEventListener('change', function() {
          selectedCountry = this.value;
          displayOrders();
          updateStats(allOrders);
        });
        // Récupérer la devise de l'utilisateur depuis Firestore
        auth.onAuthStateChanged(user => {
          if (user) {
            db.collection('users').doc(user.uid).get().then(doc => {
              if (doc.exists) {
                const country = doc.data().country || 'CM';
                const code = Object.keys(COUNTRIES_CONFIG).find(k => k === country || k === country.toUpperCase());
                if (code) { selectedCountry = code; currencySelect.value = code; }
              }
            }).catch(() => {});
          }
        });
      }

      // Notifications
      function notify(msg, type = 'info') {
        const existing = document.querySelector('.notify-toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'notify-toast ' + type;
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => toast.classList.remove('show'), 4000);
      }

      // Fonctions de statut
      function getStatusClass(status) {
        const s = (status || '').toLowerCase();
        if (s.includes('succes') || s.includes('succès') || s === 'completed') return 'status-completed';
        if (s.includes('en cours') || s === 'processing' || s === 'in progress') return 'status-processing';
        if (s.includes('en attente') || s === 'pending') return 'status-pending';
        if (s.includes('annul') || s.includes('rembours') || s === 'canceled') return 'status-cancelled';
        if (s.includes('partiel') || s === 'partial') return 'status-partial';
        return 'status-pending';
      }
      function getStatusText(status) {
        const s = (status || '').toLowerCase();
        if (s.includes('succes') || s.includes('succès') || s === 'completed') return 'Terminée';
        if (s.includes('en cours') || s === 'processing' || s === 'in progress') return 'En cours';
        if (s.includes('en attente') || s === 'pending') return 'En attente';
        if (s.includes('annul') || s.includes('rembours') || s === 'canceled') return 'Annulée';
        if (s.includes('partiel') || s === 'partial') return 'Partiel';
        return status || 'En attente';
      }

      function calculateProgress(order) {
        const status = (order.status || '').toLowerCase();
        if (status.includes('succes') || status.includes('succès') || status === 'completed') return 100;
        if (status.includes('annul') || status.includes('rembours') || status === 'canceled') return 0;
        const qty = order.quantity || 0;
        const remains = order.providerRemains !== undefined ? order.providerRemains : qty;
        if (status.includes('partiel') || status === 'partial') {
          if (qty > 0) return Math.min(100, Math.round(((qty - remains) / qty) * 100));
        }
        return 0;
      }

      function guessPlatform(serviceName, link) {
        const n = ((serviceName || '') + ' ' + (link || '')).toLowerCase();
        if (n.includes('instagram')) return 'Instagram';
        if (n.includes('facebook')) return 'Facebook';
        if (n.includes('tiktok')) return 'TikTok';
        if (n.includes('youtube')) return 'YouTube';
        if (n.includes('twitter') || n.includes('x.com')) return 'X (Twitter)';
        if (n.includes('telegram')) return 'Telegram';
        if (n.includes('spotify')) return 'Spotify';
        if (n.includes('linkedin')) return 'LinkedIn';
        if (n.includes('twitch')) return 'Twitch';
        return 'Autre';
      }

      function detectQuality(serviceName) {
        const n = (serviceName || '').toLowerCase();
        if (n.includes('haute qualité') || n.includes('hq') || n.includes('premium') || n.includes('réal') || n.includes('real') || n.includes('no drop')) return 'Haute qualité';
        if (n.includes('qualité moyenne') || n.includes('mq') || n.includes('mixte') || n.includes('standard')) return 'Qualité moyenne';
        return 'Standard';
      }

      function generateShareMessage(orderData) {
        const lines = [];
        lines.push(`📋 *Commande ${orderData.orderId}*`);
        lines.push(`📅 Date : ${orderData.dateStr}`);
        lines.push(`🌐 Plateforme : ${orderData.platform || 'N/A'}`);
        lines.push(`🛠 Service : ${orderData.service}`);
        lines.push(`⭐ Qualité : ${orderData.quality}`);
        lines.push(`📊 Quantité : ${orderData.quantity}`);
        lines.push(`💰 Montant : ${orderData.formattedAmount}`);
        lines.push(`📌 Statut : ${orderData.statusLabel}`);
        if (orderData.link) lines.push(`🔗 Lien : ${orderData.link}`);
        if (orderData.comments) lines.push(`💬 Commentaires : ${orderData.comments}`);
        lines.push('');
        lines.push(`✅ Commande avancée sur Social Boost Horizon`);
        lines.push(`🚀 socialboosthorizon.com`);
        return lines.join('\n');
      }

      // Affichage des commandes
      function displayOrders() {
        if (!ordersList) return;
        const ordersToShow = displayedOrders.slice(0, currentDisplayLimit);
        if (ordersToShow.length === 0) {
          ordersList.innerHTML = `<div style="text-align:center;padding:40px;color:var(--adv-text-dim);"><i class="fas fa-inbox" style="font-size:3rem;opacity:0.3;"></i><p>Aucune commande avancée trouvée</p></div>`;
          loadMoreContainer.style.display = 'none';
          updateStats(allOrders);
          return;
        }

        let html = '';
        ordersToShow.forEach(order => {
          const docId = order.id;
          let createdAtDate = order.createdAt ? (order.createdAt.toDate ? order.createdAt.toDate() : new Date(order.createdAt)) : new Date();
          const dateStr = createdAtDate.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });

          const displayOrderId = order.orderId || docId;
          const service = order.serviceName || 'N/A';
          const link = order.link || '';
          const platform = order.platform || guessPlatform(service, link);
          const platformIcon = (() => {
            const p = platform.toLowerCase();
            if (p.includes('instagram')) return 'fab fa-instagram';
            if (p.includes('facebook')) return 'fab fa-facebook';
            if (p.includes('tiktok')) return 'fab fa-tiktok';
            if (p.includes('youtube')) return 'fab fa-youtube';
            if (p.includes('twitter') || p.includes('x')) return 'fab fa-x-twitter';
            if (p.includes('telegram')) return 'fab fa-telegram';
            if (p.includes('spotify')) return 'fab fa-spotify';
            if (p.includes('linkedin')) return 'fab fa-linkedin';
            if (p.includes('twitch')) return 'fab fa-twitch';
            return 'fas fa-globe';
          })();

          const quality = order.quality || detectQuality(service);
          const quantity = order.quantity || 0;
          const totalCost = order.priceXAF || 0;
          const statusText = order.status || 'N/A';
          const hasProvider = !!order.providerOrderId;
          const remains = order.providerRemains !== undefined ? order.providerRemains : quantity;
          const delivered = quantity - remains;
          const progress = calculateProgress(order);
          const statusClass = getStatusClass(statusText);
          const statusLabel = getStatusText(statusText);
          const formattedAmount = formatAmount(totalCost);
          const customComments = order.comments || '';

          const shareData = { orderId: displayOrderId, dateStr, platform, service, quality, quantity: quantity.toLocaleString('fr-FR'), formattedAmount, statusLabel, link, comments: customComments };

          const stLower = statusText.toLowerCase();
          const canCancel = stLower.includes('en attente') || stLower.includes('pending') || stLower.includes('en cours') || stLower.includes('processing') || stLower.includes('in progress');

          html += `
            <div class="order-card" data-docid="${docId}">
              <div class="order-card-header">
                <span class="order-id">${displayOrderId}</span>
                <div class="order-meta">
                  <span class="platform-badge"><i class="${platformIcon}"></i> ${platform}</span>
                  <span>${service}</span>
                  <span class="order-status-badge ${statusClass}">${statusLabel}</span>
                </div>
                <span style="color:var(--adv-text-dim);font-size:0.8rem;">${dateStr}</span>
              </div>
              <div class="progress-bar-container">
                <span style="font-size:0.8rem;color:var(--adv-text-dim);">${quantity.toLocaleString('fr-FR')} ${hasProvider ? '· '+delivered.toLocaleString('fr-FR')+' livrés' : ''}</span>
                <div class="progress-bar"><div class="progress-fill" style="width:${progress}%;"></div></div>
                <span class="progress-percent">${progress}%</span>
                <span style="font-weight:600;color:var(--adv-gold);">${formattedAmount}</span>
                <i class="fas fa-chevron-down toggle-icon" style="cursor:pointer;margin-left:10px;"></i>
              </div>
              <div class="order-details">
                <div class="details-grid">
                  <div class="detail-item"><div class="detail-label">ID commande</div><div class="detail-value">${displayOrderId} <button class="copy-btn" onclick="event.stopPropagation(); navigator.clipboard.writeText('${displayOrderId.replace(/'/g, "\\'")}').then(()=>{ const t=this.nextElementSibling; if(t){t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',1500); }})"><i class="far fa-copy"></i></button><span class="copied-tooltip">Copié</span></div></div>
                  <div class="detail-item"><div class="detail-label">Date</div><div class="detail-value">${dateStr} <button class="copy-btn" onclick="event.stopPropagation(); navigator.clipboard.writeText('${dateStr.replace(/'/g, "\\'")}').then(()=>{ const t=this.nextElementSibling; if(t){t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',1500); }})"><i class="far fa-copy"></i></button><span class="copied-tooltip">Copié</span></div></div>
                  <div class="detail-item"><div class="detail-label">Plateforme</div><div class="detail-value"><i class="${platformIcon}" style="margin-right:5px;"></i> ${platform}</div></div>
                  <div class="detail-item"><div class="detail-label">Service</div><div class="detail-value">${service} <button class="copy-btn" onclick="event.stopPropagation(); navigator.clipboard.writeText('${service.replace(/'/g, "\\'")}').then(()=>{ const t=this.nextElementSibling; if(t){t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',1500); }})"><i class="far fa-copy"></i></button><span class="copied-tooltip">Copié</span></div></div>
                  <div class="detail-item"><div class="detail-label">Qualité</div><div class="detail-value">${quality}</div></div>
                  <div class="detail-item"><div class="detail-label">Quantité</div><div class="detail-value">${quantity.toLocaleString('fr-FR')}</div></div>
                  <div class="detail-item"><div class="detail-label">Montant</div><div class="detail-value">${formattedAmount}</div></div>
                  ${link ? `<div class="detail-item"><div class="detail-label">Lien</div><div class="detail-value"><a href="${link}" target="_blank" onclick="event.stopPropagation();">Voir</a> <button class="copy-btn" onclick="event.stopPropagation(); navigator.clipboard.writeText('${link.replace(/'/g, "\\'")}').then(()=>{ const t=this.nextElementSibling; if(t){t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',1500); }})"><i class="far fa-copy"></i></button><span class="copied-tooltip">Copié</span></div></div>` : ''}
                  <div class="detail-item"><div class="detail-label">Statut</div><div class="detail-value"><span class="order-status-badge ${statusClass}">${statusLabel}</span></div></div>
                  ${hasProvider ? `<div class="detail-item"><div class="detail-label">Départ</div><div class="detail-value">${(order.providerStartCount||0).toLocaleString('fr-FR')}</div></div>
                  <div class="detail-item"><div class="detail-label">Livrés</div><div class="detail-value" style="color:var(--adv-secondary);">${delivered.toLocaleString('fr-FR')}</div></div>
                  <div class="detail-item"><div class="detail-label">Restants</div><div class="detail-value" style="color:#FFB800;">${remains.toLocaleString('fr-FR')}</div></div>` : ''}
                  ${order.refunded && order.refundedAmount > 0 ? `<div class="detail-item"><div class="detail-label">Remboursé</div><div class="detail-value" style="color:var(--adv-secondary);">${formatAmount(order.refundedAmount)}</div></div>` : ''}
                </div>
                ${customComments ? `<div class="comments-section"><div class="comments-title"><i class="fas fa-comment"></i> Commentaires</div><div class="comments-content">${customComments}</div></div>` : ''}
                ${shareOrder(shareData)}
                <div class="afb-actions">
                  <button class="afb-btn status" onclick="event.stopPropagation(); checkAfbStatus('${docId}')"><i class="fas fa-search"></i> Statut</button>
                  <button class="afb-btn refill" onclick="event.stopPropagation(); requestAfbRefill('${docId}')"><i class="fas fa-redo"></i> Refill</button>
                  ${canCancel ? `<button class="afb-btn cancel" onclick="event.stopPropagation(); cancelAfbOrder('${docId}')"><i class="fas fa-times"></i> Annuler</button>` : ''}
                </div>
              </div>
            </div>
          `;
        });

        ordersList.innerHTML = html;

        // Gestion toggles
        document.querySelectorAll('.order-card').forEach(card => {
          const icon = card.querySelector('.toggle-icon');
          const details = card.querySelector('.order-details');
          card.addEventListener('click', (e) => {
            if (e.target.closest('button') || e.target.closest('a')) return;
            details.classList.toggle('open');
            icon.className = details.classList.contains('open') ? 'fas fa-chevron-up toggle-icon' : 'fas fa-chevron-down toggle-icon';
          });
        });

        loadMoreContainer.style.display = displayedOrders.length > currentDisplayLimit ? 'block' : 'none';
        updateStats(allOrders);
      }

      function shareOrder(orderData) {
        const message = generateShareMessage(orderData);
        const encoded = encodeURIComponent(message);
        return `
          <div class="share-section">
            <button class="share-btn" onclick="event.stopPropagation(); window.open('https://api.whatsapp.com/send?text=${encoded}', '_blank')"><i class="fab fa-whatsapp"></i> WhatsApp</button>
            <button class="share-btn facebook" onclick="event.stopPropagation(); window.open('https://www.facebook.com/sharer/sharer.php?u=https://socialboosthorizon.com&quote=${encoded}', '_blank')"><i class="fab fa-facebook"></i> Facebook</button>
            <button class="share-btn copy-share" onclick="event.stopPropagation(); navigator.clipboard.writeText(\`${message.replace(/`/g, '\\`')}\`).then(() => { const n=document.createElement('div'); n.className='copied-tooltip'; n.textContent='Copié !'; n.style.position='static'; n.style.opacity='1'; this.appendChild(n); setTimeout(()=>n.remove(),1500); })"><i class="far fa-copy"></i> Copier</button>
          </div>
        `;
      }

      // Mise à jour des stats
      function updateStats(orders) {
        const total = orders.length;
        const completed = orders.filter(o => (o.status||'').toLowerCase().includes('succes') || (o.status||'').toLowerCase().includes('succès') || (o.status||'').toLowerCase() === 'completed').length;
        const processing = orders.filter(o => (o.status||'').toLowerCase().includes('en cours') || (o.status||'').toLowerCase() === 'processing' || (o.status||'').toLowerCase() === 'in progress').length;
        const pending = orders.filter(o => (o.status||'').toLowerCase().includes('en attente') || (o.status||'').toLowerCase() === 'pending').length;
        const cancelled = orders.filter(o => (o.status||'').toLowerCase().includes('annul') || (o.status||'').toLowerCase().includes('rembours') || (o.status||'').toLowerCase() === 'canceled' || (o.status||'').toLowerCase().includes('partiel') || (o.status||'').toLowerCase() === 'partial').length;
        totalOrdersEl.textContent = total;
        completedOrdersEl.textContent = completed;
        processingOrdersEl.textContent = processing;
        pendingOrdersEl.textContent = pending;
        cancelledOrdersEl.textContent = cancelled;
        const totalXAF = orders.reduce((sum, o) => sum + (o.priceXAF || 0), 0);
        totalAmountEl.textContent = formatAmount(totalXAF);
      }

      // Tri et filtres
      function sortOrders(sortOption) {
        switch (sortOption) {
          case 'date-desc':
            displayedOrders.sort((a,b) => (b.createdAt?.toDate?.()||new Date(b.createdAt||0)) - (a.createdAt?.toDate?.()||new Date(a.createdAt||0)));
            break;
          case 'date-asc':
            displayedOrders.sort((a,b) => (a.createdAt?.toDate?.()||new Date(a.createdAt||0)) - (b.createdAt?.toDate?.()||new Date(b.createdAt||0)));
            break;
          case 'amount-desc':
            displayedOrders.sort((a,b) => (b.priceXAF||0) - (a.priceXAF||0));
            break;
          case 'amount-asc':
            displayedOrders.sort((a,b) => (a.priceXAF||0) - (b.priceXAF||0));
            break;
          case 'status':
            const order = { 'terminée':1, 'en cours':2, 'en attente':3, 'partiel':4, 'annulée':5 };
            displayedOrders.sort((a,b) => (order[getStatusText(a.status).toLowerCase()] || 99) - (order[getStatusText(b.status).toLowerCase()] || 99));
            break;
        }
      }

      function filterOrders(filter) {
        if (filter === 'all') displayedOrders = [...allOrders];
        else {
          displayedOrders = allOrders.filter(order => {
            const s = (order.status || '').toLowerCase();
            if (filter === 'completed') return s.includes('succes') || s.includes('succès') || s === 'completed';
            if (filter === 'processing') return s.includes('en cours') || s === 'processing' || s === 'in progress';
            if (filter === 'pending') return s.includes('en attente') || s === 'pending';
            if (filter === 'cancelled') return s.includes('annul') || s.includes('rembours') || s === 'canceled' || s.includes('partiel') || s === 'partial';
            return false;
          });
        }
        sortOrders(currentSort);
        displayOrders();
      }

      // Actions
      async function checkAfbStatus(docId) {
        if (!currentUid) return;
        try {
          const idToken = await auth.currentUser.getIdToken();
          notify('Vérification du statut en cours...', 'info');
          const res = await fetch(`${BACKEND_URL}/api/afriqueboost/status/${docId}`, {
            method: 'GET',
            headers: { 'Authorization': `Bearer ${idToken}` }
          });
          const data = await res.json();
          if (data.success) {
            notify('Statut synchronisé avec succès !', 'success');
            fetchOrders();
          } else {
            notify(data.error || 'Erreur lors de la vérification.', 'error');
          }
        } catch(e) {
          notify('Erreur réseau.', 'error');
        }
      }

      async function requestAfbRefill(docId) {
        if (!currentUid) return;
        try {
          const idToken = await auth.currentUser.getIdToken();
          notify('Demande de recharge en cours...', 'info');
          const res = await fetch(`${BACKEND_URL}/api/afriqueboost/refill`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${idToken}` },
            body: JSON.stringify({ orderId: docId })
          });
          const data = await res.json();
          if (data.success) {
            notify('Recharge demandée avec succès !', 'success');
          } else {
            notify(data.error || 'Erreur lors de la demande de recharge.', 'error');
          }
        } catch(e) {
          notify('Erreur réseau.', 'error');
        }
      }

      async function cancelAfbOrder(docId) {
        if (!currentUid) return;
        if (!confirm('Voulez-vous vraiment demander l\'annulation de cette commande ?')) return;
        try {
          const idToken = await auth.currentUser.getIdToken();
          notify('Envoi de la demande d\'annulation...', 'info');
          const res = await fetch(`${BACKEND_URL}/api/afriqueboost/cancel`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${idToken}` },
            body: JSON.stringify({ orderId: docId })
          });
          const data = await res.json();
          if (data.success) {
            notify(data.message || 'Demande envoyée au fournisseur.', 'success');
            fetchOrders();
          } else {
            notify(data.error || 'Erreur lors de la demande.', 'error');
          }
        } catch(e) {
          notify('Erreur réseau.', 'error');
        }
      }

      // Récupération des commandes
      async function fetchOrders() {
        if (!currentUid) return;
        ordersList.innerHTML = '<div style="text-align:center;padding:40px;"><i class="fas fa-spinner fa-spin" style="font-size:2rem;color:var(--adv-primary);"></i><p style="margin-top:10px;color:var(--adv-text-dim);">Chargement...</p></div>';
        loadMoreContainer.style.display = 'none';
        try {
          const snapshot = await db.collection('autoOrders')
            .where('userId', '==', currentUid)
            .where('provider', '==', 'afriqueboost')
            .get();
          allOrders = [];
          snapshot.forEach(doc => {
            const data = doc.data();
            data.id = doc.id;
            allOrders.push(data);
          });
          displayedOrders = [...allOrders];
          sortOrders(currentSort);
          displayOrders();
          updateStats(allOrders);
        } catch (err) {
          ordersList.innerHTML = `<div style="text-align:center;padding:40px;color:var(--adv-accent);"><i class="fas fa-exclamation-triangle"></i><p>Erreur: ${err.message}</p></div>`;
        }
      }

      // Événements
      filterBtns.forEach(btn => {
        btn.addEventListener('click', function() {
          filterBtns.forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          currentFilter = this.dataset.filter;
          filterOrders(currentFilter);
        });
      });

      sortSelect.addEventListener('change', function() {
        currentSort = this.value;
        filterOrders(currentFilter);
      });

      limitSelect.addEventListener('change', function() {
        currentDisplayLimit = parseInt(this.value);
        displayOrders();
      });

      loadMoreBtn.addEventListener('click', function() {
        currentDisplayLimit += parseInt(limitSelect.value);
        displayOrders();
      });

      refreshBtn.addEventListener('click', fetchOrders);

      // Authentification
      auth.onAuthStateChanged(async user => {
        if (!user) {
          notify('Vous devez être connecté pour voir votre historique.', 'error');
          setTimeout(() => { window.location.href = 'login.html'; }, 2000);
          return;
        }
        currentUid = user.uid;
        // Balance
        db.collection('users').doc(currentUid).onSnapshot(doc => {
          if (doc.exists) {
            const data = doc.data();
            userBalanceXAF = data.balance || 0;
            userBalanceEl.textContent = formatAmount(userBalanceXAF);
            const country = data.country || 'CM';
            const code = Object.keys(COUNTRIES_CONFIG).find(k => k === country || k === country.toUpperCase());
            if (code && currencySelect) { selectedCountry = code; currencySelect.value = code; }
          }
        });
        fetchOrders();
        // Rafraîchissement automatique des statuts en arrière-plan
        setInterval(() => {
          if (currentUid) {
            // On ne relance que si la page est visible
            if (!document.hidden) {
              // On peut récupérer les commandes en attente/en cours et appeler checkAfbStatus pour chacune
              // Mais pour éviter trop d'appels, on le fait seulement sur celles qui sont dans la vue
              // Ici on va juste appeler fetchOrders() pour rafraîchir tout
              // Mais fetchOrders peut être lourd. On pourrait faire une vérification sélective.
              // Par simplicité, on utilise un intervalle plus long.
            }
          }
        }, 60000); // toutes les minutes
      });

      // Exposer les fonctions globales pour les boutons onclick
      window.checkAfbStatus = checkAfbStatus;
      window.requestAfbRefill = requestAfbRefill;
      window.cancelAfbOrder = cancelAfbOrder;
    });
  </script>
</body>
</html>
