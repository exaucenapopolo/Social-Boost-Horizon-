<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <meta name="description" content="Connectez-vous à votre compte Social Boost Horizon">
  <meta property="og:title" content="Connexion - Social Boost Horizon">
  <meta property="og:description" content="Accédez à votre tableau de bord pour booster vos réseaux sociaux.">
  <meta property="og:image" content="https://raw.githubusercontent.com/exaucenapopolo/Social-Boost-Horizon-/refs/heads/main/assets/logos/Logo%20social%20Boost%20horizon.jpg">
  <meta property="og:url" content="https://socialboosthorizon.com/login.html">
  <title>Connexion – Social Boost Horizon</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <style>
    :root {
      --sbh-deep-blue: #080e1a;
      --sbh-gradient-start: #1e3c72;
      --sbh-gradient-end: #6a0dad;
      --sbh-btn-color: #1E90FF;
      --sbh-light-blue: #4DA6FF;
      --sbh-gold: #D4AF37;
      --sbh-gold-deep: #B8860B;
      --glass-bg: rgba(20, 30, 50, 0.6);
      --glass-border: rgba(255, 255, 255, 0.1);
      --input-bg: rgba(255, 255, 255, 0.08);
      --text-white: #FFFFFF;
      --text-light: rgba(255, 255, 255, 0.85);
      --error-color: #ff4d4d;
      --font-primary: 'Plus Jakarta Sans', sans-serif;
      --font-display: 'Space Grotesk', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 14px; scroll-behavior: smooth; }
    @media (min-width: 768px) { html { font-size: 15px; } }
    @media (max-width: 480px) { html { font-size: 13px; } }

    body {
      font-family: var(--font-primary);
      color: var(--text-white);
      background: var(--sbh-deep-blue);
      position: relative;
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    .background-animation {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
      background: radial-gradient(ellipse at 30% 50%, #0f2040 0%, #080e1a 70%);
    }
    .bg-grid {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
      background-image: linear-gradient(rgba(77,166,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(77,166,255,0.05) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8, 14, 26, 0.85); backdrop-filter: blur(20px);
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.7rem 1.8rem; border-bottom: 1px solid var(--glass-border);
    }
    @media (max-width: 480px) { header { padding: 0.6rem 1rem; } }

    .logo-link { display: flex; align-items: center; text-decoration: none; gap: 10px; }
    .logo-img {
      height: 42px; width: 42px; border-radius: 50%; object-fit: cover;
      border: 2px solid var(--sbh-gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
    }
    @media (max-width: 480px) { .logo-img { height: 36px; width: 36px; } }
    .logo-text { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.15; }
    .logo-text .social { font-size: 0.8rem; font-weight: 600; color: #fff; letter-spacing: 1px; }
    .logo-text .boost { font-size: 1.4rem; font-weight: 800; color: var(--sbh-gold); line-height: 1; }
    @media (max-width: 480px) { .logo-text .boost { font-size: 1.2rem; } }
    .logo-text .horizon { font-size: 0.9rem; font-weight: 600; color: #fff; }

    .icon-hamburger { font-size: 1.6rem; cursor: pointer; transition: 0.3s; }
    .icon-hamburger:hover { color: var(--sbh-gold); }
    .mobile-menu {
      display: none; position: absolute; top: 65px; right: 1.8rem;
      background: rgba(10, 22, 43, 0.95); border: 1px solid var(--glass-border);
      border-radius: 16px; padding: 1.2rem; flex-direction: column; z-index: 200;
      min-width: 240px; backdrop-filter: blur(20px);
    }
    header.open .mobile-menu { display: flex; }
    .mobile-menu a { color: #fff; padding: 0.7rem 0.9rem; text-decoration: none; border-radius: 8px; transition: 0.3s; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; }
    .mobile-menu a:hover { background: rgba(30, 60, 114, 0.5); transform: translateX(5px); }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: linear-gradient(135deg, var(--sbh-gradient-start), var(--sbh-btn-color));
      color: #fff; padding: 0.7rem 1.7rem; border: none; border-radius: 50px;
      text-decoration: none; font-weight: 600; transition: all 0.3s ease; font-size: 0.95rem;
      box-shadow: 0 4px 15px rgba(30, 144, 255, 0.3); letter-spacing: 0.5px;
      cursor: pointer; position: relative; overflow: hidden; z-index: 1;
    }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(30, 144, 255, 0.5); }
    .btn-outline { background: transparent; border: 2px solid var(--sbh-light-blue); box-shadow: none; }
    .btn-outline:hover { background: var(--sbh-light-blue); border-color: var(--sbh-light-blue); }
    .btn-google {
      background: #fff; color: #444; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .btn-google:hover { background: #f5f5f5; color: #000; }

    main {
      display: flex; justify-content: center; align-items: center;
      padding: 2rem 1rem; min-height: calc(100vh - 70px);
    }
    .form-container {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: 24px; padding: 2.5rem 2rem; max-width: 460px; width: 100%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px);
    }
    @media (max-width: 480px) { .form-container { padding: 1.8rem 1.3rem; } }
    .form-container h2 {
      font-family: var(--font-display); font-size: 1.8rem; text-align: center;
      margin-bottom: 0.5rem; color: var(--sbh-gold);
    }
    @media (max-width: 480px) { .form-container h2 { font-size: 1.5rem; } }
    .form-container p { text-align: center; margin-bottom: 1.5rem; font-size: 0.9rem; color: var(--text-light); }

    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-size: 0.9rem; margin-bottom: 0.4rem; color: #fff; font-weight: 500; }
    .form-group label i { color: var(--sbh-gold); margin-right: 6px; }
    .form-group input {
      width: 100%; padding: 12px 14px; border: 1px solid var(--glass-border);
      border-radius: 12px; background: var(--input-bg); color: #fff;
      font-size: 0.95rem; font-family: var(--font-primary); transition: 0.3s;
    }
    .form-group input:focus { outline: none; border-color: var(--sbh-light-blue); box-shadow: 0 0 0 3px rgba(77,166,255,0.15); }
    .form-group input::placeholder { color: rgba(255,255,255,0.4); }
    .error { color: var(--error-color); font-size: 0.8rem; margin-top: 5px; display: none; }

    .btn-container { margin-top: 1.8rem; display: flex; flex-direction: column; gap: 12px; }
    .btn-container button { width: 100%; }
    .divider {
      display: flex; align-items: center; text-align: center; margin: 18px 0;
      color: rgba(255,255,255,0.5); font-size: 0.85rem;
    }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--glass-border); }
    .divider:not(:empty)::before { margin-right: 1rem; }
    .divider:not(:empty)::after { margin-left: 1rem; }
    .link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; }
    .link a { color: var(--sbh-light-blue); text-decoration: none; transition: color 0.3s; }
    .link a:hover { text-decoration: underline; }

    footer {
      background: rgba(8, 14, 26, 0.9); border-top: 1px solid var(--glass-border);
      padding: 2rem 1rem; text-align: center;
    }
    .footer-bottom { font-size: 0.85rem; color: rgba(255,255,255,0.7); }
    .footer-bottom a { color: rgba(255,255,255,0.7); text-decoration: none; transition: color 0.3s; margin: 0 0.5rem; }
    .footer-bottom a:hover { color: #fff; }

    .notification {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      padding: 14px 24px; border-radius: 12px; color: #fff; font-weight: 600;
      z-index: 1000; opacity: 0; transition: opacity 0.3s, top 0.3s;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3); font-size: 0.9rem;
    }
    .notification.show { opacity: 1; top: 30px; }
    .notification.success { background: #2e7d32; }
    .notification.error { background: #c62828; }

    .loader {
      display: none; width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%; border-top: 3px solid #fff; animation: spin 0.8s linear infinite;
      position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
    }
    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
    .btn-loading .loader { display: block; }
    .btn-loading .btn-text { opacity: 0.6; }
    .btn { position: relative; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="background-animation"></div>
  <div id="notification" class="notification"><span id="notification-message"></span></div>

  <header>
    <a href="index.html" class="logo-link">
      <img src="https://raw.githubusercontent.com/exaucenapopolo/Social-Boost-Horizon-/refs/heads/main/assets/logos/Logo%20social%20Boost%20horizon.jpg" alt="Logo" class="logo-img">
      <div class="logo-text">
        <span class="social">SOCIAL</span>
        <span class="boost">BOOST</span>
        <span class="horizon">HORIZON</span>
      </div>
    </a>
    <i class="fa-solid fa-bars icon-hamburger"></i>
    <div class="mobile-menu">
      <a href="index.html#hero"><i class="fas fa-home"></i> Accueil</a>
      <a href="index.html#services"><i class="fas fa-list-check"></i> Services</a>
      <a href="index.html#why"><i class="fas fa-star"></i> Pourquoi nous</a>
      <a href="index.html#faq"><i class="fas fa-circle-question"></i> FAQ</a>
      <a href="register.html"><i class="fas fa-user-plus"></i> Inscription</a>
    </div>
  </header>

  <main>
    <div class="form-container" data-aos="fade-up">
      <h2>Connexion</h2>
      <p>Accédez à votre tableau de bord</p>
      <form id="loginForm">
        <div class="form-group">
          <label for="email"><i class="fas fa-envelope"></i>Email</label>
          <input type="email" id="email" required placeholder="votre@email.com">
          <div class="error" id="emailError"></div>
        </div>
        <div class="form-group">
          <label for="password"><i class="fas fa-lock"></i>Mot de passe</label>
          <input type="password" id="password" required placeholder="••••••">
          <div class="error" id="passwordError"></div>
        </div>
        <div class="btn-container">
          <button type="submit" class="btn" id="loginBtn"><span class="btn-text">Se connecter</span><div class="loader" id="loginLoader"></div></button>
          <div class="divider">OU</div>
          <button type="button" class="btn btn-google" id="googleLogin"><i class="fab fa-google"></i> <span>Connexion Google</span><div class="loader" id="googleLoader"></div></button>
        </div>
        <div class="link">Pas encore de compte ? <a href="register.html">Créer un compte</a></div>
      </form>
    </div>
  </main>

  <footer>
    <div class="footer-bottom">&copy; 2026 Social Boost Horizon • <a href="legal.html">Mentions légales</a> • <a href="terms.html">CGV</a> • <a href="privacy.html">Confidentialité</a></div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script>
    function showNotification(message, type) {
      const n = document.getElementById('notification');
      document.getElementById('notification-message').textContent = message;
      n.className = 'notification ' + type;
      setTimeout(() => n.classList.add('show'), 100);
      setTimeout(() => n.classList.remove('show'), 5000);
    }

    const firebaseConfig = {
      apiKey: "AIzaSyD2JiDS0g8EkeNXxjO7_wGI3WznpPvcCCk",
      authDomain: "social-boost-horizon.firebaseapp.com",
      projectId: "social-boost-horizon",
      storageBucket: "social-boost-horizon.appspot.com",
      messagingSenderId: "43658165639",
      appId: "1:43658165639:web:b8f492dc6a25cd12fc6722"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    auth.onAuthStateChanged(async (user) => {
      if (user) {
        const userDoc = await db.collection('users').doc(user.uid).get();
        if (!userDoc.exists) {
          await db.collection('users').doc(user.uid).set({
            userId: user.uid,
            username: user.email.split('@')[0],
            email: user.email || '',
            referralCode: Math.random().toString(36).substring(2,10).toUpperCase(),
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            provider: 'google'
          });
        }
        showNotification('✅ Connecté, redirection...', 'success');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
      }
    });

    document.getElementById('googleLogin').addEventListener('click', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('googleLogin');
      btn.classList.add('btn-loading');
      try {
        await firebase.auth().signInWithPopup(provider);
      } catch (error) {
        showNotification(`❌ ${error.message}`, 'error');
      } finally {
        btn.classList.remove('btn-loading');
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.classList.add('btn-loading');
      document.querySelectorAll('.error').forEach(el => { el.textContent = ''; el.style.display = 'none'; });
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      let valid = true;
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('emailError').textContent = 'Email invalide'; document.getElementById('emailError').style.display = 'block'; valid = false;
      }
      if (!password) {
        document.getElementById('passwordError').textContent = 'Mot de passe requis'; document.getElementById('passwordError').style.display = 'block'; valid = false;
      }
      if (!valid) { btn.classList.remove('btn-loading'); return; }
      try {
        const { user } = await auth.signInWithEmailAndPassword(email, password);
        const userDoc = await db.collection('users').doc(user.uid).get();
        if (!userDoc.exists) {
          await db.collection('users').doc(user.uid).set({
            userId: user.uid, username: user.email.split('@')[0], email: user.email,
            referralCode: Math.random().toString(36).substring(2,10).toUpperCase(),
            createdAt: firebase.firestore.FieldValue.serverTimestamp(), provider: 'email'
          });
        }
        showNotification('✅ Connexion réussie !', 'success');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
      } catch (error) {
        let msg = "Erreur";
        if (error.code === 'auth/user-not-found') msg = "Aucun compte avec cet email";
        else if (error.code === 'auth/wrong-password') msg = "Mot de passe incorrect";
        else msg = error.message;
        showNotification(`❌ ${msg}`, 'error');
      } finally {
        btn.classList.remove('btn-loading');
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      AOS.init({ duration: 800, once: true, offset: 50 });
      const header = document.querySelector("header");
      document.querySelector(".icon-hamburger").addEventListener("click", () => header.classList.toggle("open"));
      document.addEventListener("click", (e) => { if (!header.contains(e.target) && header.classList.contains("open")) header.classList.remove("open"); });
    });
  </script>
</body>
</html>
