<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Boutique</title>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <style>
    /* Variables dynamiques écrasées par le JS */
    :root {
      --bg: #F8F9FA;
      --text: #212529;
      --card: #FFFFFF;
      --border: rgba(0,0,0,0.1);
      --accent: #F0A500;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    * { box-sizing: border-box; }
    body { background-color: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; transition: 0.3s; }

    /* Header Boutique */
    .store-header {
      text-align: center; padding: 40px 20px 20px;
      background: var(--card); border-bottom: 1px solid var(--border);
    }
    .logo { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); margin-bottom: 10px; display: none; background: #fff;}
    .title { font-size: 1.5rem; margin: 0; font-weight: 700; }
    .slogan { font-size: 0.9rem; opacity: 0.7; margin-top: 5px; }
    .desc { font-size: 0.95rem; padding: 20px; text-align: center; line-height: 1.5; max-width: 600px; margin: 0 auto; opacity: 0.9;}

    /* Contenu */
    .container { max-width: 800px; margin: 0 auto; padding: 15px; }
    .platform-title { font-size: 0.85rem; text-transform: uppercase; font-weight: 700; margin: 25px 0 10px 0; opacity: 0.6; }
    
    .service-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }
    .service-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px;}
    .service-name { font-weight: 600; font-size: 0.95rem; line-height: 1.3;}
    .service-price { color: var(--accent); font-weight: 800; font-size: 1.2rem; white-space: nowrap;}
    .service-unit { font-size: 0.75rem; opacity: 0.6; font-weight: 500;}

    .btn-buy {
      width: 100%; padding: 12px; border-radius: 8px; border: none; cursor: pointer;
      background: var(--accent); color: #fff; font-weight: 700; font-size: 1rem;
      display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none;
    }

    #loader { text-align: center; padding: 100px 20px; font-weight: 600; color: var(--accent); }
    #storeContent { display: none; }
  </style>
</head>
<body>

  <div id="loader"><i class="fas fa-spinner fa-spin fa-2x"></i><br><br>Chargement de la boutique...</div>

  <div id="storeContent">
    <div class="store-header">
      <img id="sLogo" class="logo" src="">
      <h1 id="sTitle" class="title">Boutique</h1>
      <div id="sSlogan" class="slogan"></div>
    </div>
    
    <div id="sDesc" class="desc"></div>

    <div class="container" id="catalog">
      </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD2JiDS0g8EkeNXxjO7_wGI3WznpPvcCCk",
      projectId: "social-boost-horizon",
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 1. Récupérer l'ID dans l'URL
    const params = new URLSearchParams(window.location.search);
    const storeId = params.get('id');

    let storeData = null;
    let resellerWa = "";
    let resellerDiscount = 0;

    async function initStore() {
      if(!storeId) return document.getElementById('loader').innerText = "Lien invalide.";

      try {
        // 2. Charger les infos de la boutique
        const storeDoc = await db.collection('stores').doc(storeId).get();
        if(!storeDoc.exists || storeDoc.data().status !== 'published') {
          return document.getElementById('loader').innerText = "Boutique introuvable ou hors ligne.";
        }
        
        storeData = storeDoc.data();
        
        // 3. Charger le profil du revendeur (pour la remise)
        const userDoc = await db.collection('users').doc(storeData.ownerId).get();
        if(userDoc.exists) {
          resellerDiscount = userDoc.data().discountRate || 0;
        }

        resellerWa = storeData.whatsapp || "";

        // 4. Appliquer le design (Couleur & Thème)
        document.documentElement.style.setProperty('--accent', storeData.themeColor || '#F0A500');
        if(storeData.themeMode === 'dark') {
          document.documentElement.style.setProperty('--bg', '#06060A');
          document.documentElement.style.setProperty('--text', '#FFFFFF');
          document.documentElement.style.setProperty('--card', '#111122');
          document.documentElement.style.setProperty('--border', 'rgba(255,255,255,0.1)');
        }

        // 5. Remplir l'en-tête
        document.title = storeData.name;
        document.getElementById('sTitle').innerText = storeData.name;
        document.getElementById('sSlogan').innerText = storeData.slogan || "";
        document.getElementById('sDesc').innerText = storeData.description || "";
        if(storeData.logoUrl) {
          document.getElementById('sLogo').src = storeData.logoUrl;
          document.getElementById('sLogo').style.display = 'inline-block';
        }

        // 6. Charger le catalogue via API
        await loadCatalog();

        document.getElementById('loader').style.display = 'none';
        document.getElementById('storeContent').style.display = 'block';

      } catch (error) {
        document.getElementById('loader').innerText = "Erreur de chargement.";
      }
    }

    async function loadCatalog() {
      try {
        const res = await fetch('https://social-boost-exaucenapopolo2.replit.app/api/exo-services');
        const data = await res.json();
        const catalogDiv = document.getElementById('catalog');
        let html = "";

        Object.keys(data.platforms).forEach(platform => {
          const services = data.platforms[platform];
          if(services && services.length > 0) {
            html += `<div class="platform-title"><i class="fas fa-layer-group"></i> ${platform}</div>`;
            
            services.forEach(svc => {
              // Calcul du prix final
              const price = parseFloat(svc.priceXAF) || 0;
              const finalPrice = Math.ceil(price - (price * (resellerDiscount / 100)));
              const unit = (svc.isPerOne || svc.isPackage) ? '/ unité' : '/ 1000';
              
              // Préparation du message WhatsApp
              const msg = encodeURIComponent(`Bonjour, je souhaite commander ce service sur votre boutique :\n\n📌 Service: ${svc.name}\n💰 Prix estimé: ${finalPrice} FCFA ${unit}`);
              const waLink = `https://wa.me/${resellerWa.replace('+', '')}?text=${msg}`;

              html += `
                <div class="service-card">
                  <div class="service-header">
                    <div class="service-name">${svc.name}</div>
                    <div style="text-align:right;">
                      <div class="service-price">${finalPrice} FCFA</div>
                      <div class="service-unit">${unit}</div>
                    </div>
                  </div>
                  <a href="${waLink}" target="_blank" class="btn-buy"><i class="fab fa-whatsapp"></i> Commander</a>
                </div>
              `;
            });
          }
        });

        catalogDiv.innerHTML = html;
      } catch(e) {
        document.getElementById('catalog').innerHTML = "<p style='text-align:center'>Catalogue momentanément indisponible.</p>";
      }
    }

    initStore();
  </script>
</body>
</html>
