<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paiement réussi</title>
  <style>
    /* ... (Ton CSS précédent reste inchangé) ... */
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #1a1a2e; color: #e0e0e0; margin: 0; padding: 0;
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; min-height: 100vh; position: relative;
        overflow: hidden; text-align: center;
    }
    h1 { color: #4CAF50; margin-bottom: 25px; font-size: 2.5em; font-weight: 600; }
    p { color: #81D4FA; margin-bottom: 20px; font-size: 1.1em; line-height: 1.6; max-width: 600px; padding: 0 20px; }
    
    /* Styles pour les boutons d'action */
    .btn-group { display: flex; gap: 15px; margin-top: 25px; flex-wrap: wrap; justify-content: center; }
    .btn {
        text-decoration: none; padding: 12px 24px; border-radius: 8px; font-weight: bold;
        transition: all 0.3s ease; display: inline-flex; align-items: center; cursor: pointer;
        font-size: 1em; border: none; outline: none;
    }
    .btn-primary { background-color: #4CAF50; color: #fff; box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4); }
    .btn-primary:hover { background-color: #45a049; transform: translateY(-2px); }
    .btn-secondary { background-color: transparent; color: #BBDEFB; border: 2px solid #BBDEFB; }
    .btn-secondary:hover { background-color: rgba(187, 222, 251, 0.1); }
    
    .status-msg { margin-top: 15px; font-weight: bold; min-height: 24px; font-size: 0.9em;}
    .success-text { color: #4CAF50; }
    .pending-text { color: #FFC107; }
    .error-text { color: #FF5252; }

    .background-animation { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.4; z-index: -1; }
    .particle { position: absolute; background: radial-gradient(circle, #2196F3 0%, transparent 70%); border-radius: 50%; animation: moveParticle linear infinite; }
    @keyframes moveParticle { 0% { transform: translate(0, 0) scale(0.5); opacity: 0; } 25% { opacity: 1; } 100% { transform: translate(var(--x), var(--y)) scale(1.5); opacity: 0; } }
    .icon { margin-right: 8px; font-size: 1.2em; }
    
    /* Loader pour le bouton */
    .fa-spin { animation: fa-spin 2s infinite linear; }
    @keyframes fa-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(359deg); } }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div class="background-animation" id="backgroundAnimation"></div>

  <h1><i class="fas fa-check-circle icon"></i>Paiement initié avec succès !</h1>
  <p>Vous venez d’effectuer un paiement pour SOCIAL BOOST HORIZON. Si vous avez finalisé l'opération chez votre opérateur, vérifiez la mise à jour de votre solde ci-dessous.</p>
  
  <div id="statusMessage" class="status-msg"></div>

  <div class="btn-group">
    <button id="verifyBtn" class="btn btn-primary" onclick="verifyPayment()">
      <i id="verifyIcon" class="fas fa-sync-alt icon"></i> Vérifier mon solde
    </button>
    <a href="/" class="btn btn-secondary">
      <i class="fas fa-home icon"></i>Tableau de bord
    </a>
  </div>

  <script>
    // --- Logique de vérification du paiement ---
    const BACKEND_URL = ''; // Laisse vide si c'est hébergé sur le même domaine

    async function verifyPayment() {
      const pendingTx = localStorage.getItem('pendingPayment');
      const statusDiv = document.getElementById('statusMessage');
      const verifyIcon = document.getElementById('verifyIcon');
      const verifyBtn = document.getElementById('verifyBtn');

      if (!pendingTx) {
        statusDiv.innerHTML = "<span class='error-text'><i class='fas fa-exclamation-triangle'></i> Aucune transaction récente trouvée sur cet appareil.</span>";
        return;
      }

      try {
        const txData = JSON.parse(pendingTx);
        
        // Animation du bouton
        verifyIcon.classList.add('fa-spin');
        verifyBtn.disabled = true;
        statusDiv.innerHTML = "<span class='pending-text'>Vérification directe auprès de l'opérateur en cours...</span>";

        const response = await fetch(`${BACKEND_URL}/api/confirm-swychr?transactionId=${txData.transactionId}`);
        const data = await response.json();

        if (data.isPaid) {
          statusDiv.innerHTML = "<span class='success-text'><i class='fas fa-check-double'></i> Excellent ! Votre solde a bien été crédité.</span>";
          localStorage.removeItem('pendingPayment'); // Nettoyage
        } else {
          statusDiv.innerHTML = "<span class='pending-text'><i class='fas fa-clock'></i> L'opérateur traite encore la transaction. Réessayez dans 30 secondes.</span>";
        }
      } catch (error) {
        console.error("Erreur:", error);
        statusDiv.innerHTML = "<span class='error-text'>Erreur de connexion au serveur.</span>";
      } finally {
        verifyIcon.classList.remove('fa-spin');
        verifyBtn.disabled = false;
      }
    }

    // Déclenche une vérification automatique au chargement de la page
    window.addEventListener('load', () => {
        if(localStorage.getItem('pendingPayment')) {
            verifyPayment();
        }
    });

    // --- Script pour les animations de fond (Particules) ---
    const backgroundAnimation = document.getElementById('backgroundAnimation');
    function createParticle() {
      const particle = document.createElement('div');
      particle.classList.add('particle');
      const size = Math.random() * 10 + 5; 
      particle.style.width = `${size}px`;
      particle.style.height = `${size}px`;
      particle.style.left = `${Math.random() * 100}vw`;
      particle.style.top = `${Math.random() * 100}vh`;
      particle.style.setProperty('--x', (Math.random() - 0.5) * 400 + 'vw');
      particle.style.setProperty('--y', (Math.random() - 0.5) * 400 + 'vh');
      particle.style.animationDuration = `${Math.random() * 15 + 10}s`; 
      particle.style.animationDelay = `-${Math.random() * 10}s`; 
      backgroundAnimation.appendChild(particle);
      particle.addEventListener('animationend', () => {
        particle.remove();
        createParticle(); 
      });
    }
    for (let i = 0; i < 30; i++) createParticle();
  </script>
</body>
</html>
