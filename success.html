<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paiement réussi</title>
  <style>
    /* Styles généraux pour le corps de la page */
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Police moderne */
        background-color: #1a1a2e; /* Fond sombre profond */
        color: #e0e0e0; /* Texte clair pour un bon contraste */
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        position: relative; /* Pour positionner les animations de fond */
        overflow: hidden; /* Cache le débordement des animations de fond */
        text-align: center;
    }

    /* Styles pour les titres */
    h1 {
        color: #4CAF50; /* Vert vif pour le succès */
        margin-bottom: 25px;
        font-size: 2.5em;
        font-weight: 600;
        letter-spacing: 1px;
    }

    /* Styles pour les paragraphes */
    p {
        color: #81D4FA; /* Bleu clair pour les informations */
        margin-bottom: 20px;
        font-size: 1.1em;
        line-height: 1.6;
        max-width: 600px;
        padding: 0 20px;
    }

    /* Styles pour le conteneur des boutons d'action */
    .btn-group {
        display: flex;
        gap: 15px;
        margin-top: 25px;
        flex-wrap: wrap;
        justify-content: center;
    }

    /* Styles de base pour les boutons */
    .btn {
        text-decoration: none;
        padding: 12px 24px;
        border-radius: 8px;
        font-weight: bold;
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        cursor: pointer;
        font-size: 1em;
        border: none;
        outline: none;
    }

    /* Bouton principal (Vérification / Action) */
    .btn-primary {
        background-color: #4CAF50;
        color: #fff;
        box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
    }

    .btn-primary:hover {
        background-color: #45a049;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(76, 175, 80, 0.6);
    }

    .btn-primary:disabled {
        background-color: #555;
        color: #aaa;
        cursor: not-allowed;
        box-shadow: none;
        transform: none;
    }

    /* Bouton secondaire (Retour Accueil) */
    .btn-secondary {
        background-color: transparent;
        color: #BBDEFB;
        border: 2px solid #BBDEFB;
    }

    .btn-secondary:hover {
        background-color: rgba(187, 222, 251, 0.1);
        color: #fff;
        border-color: #fff;
    }

    /* Zone d'affichage des messages de statut de vérification */
    .status-msg {
        margin-top: 15px;
        font-weight: bold;
        min-height: 24px;
        font-size: 1em;
    }
    .success-text { color: #4CAF50; }
    .pending-text { color: #FFC107; }
    .error-text { color: #FF5252; }

    /* Conteneur pour l'animation d'arrière-plan */
    .background-animation {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none; /* Permet de cliquer à travers */
        opacity: 0.4;
        z-index: -1; /* Place l'animation derrière le contenu */
    }

    /* Styles pour une particule individuelle */
    .particle {
        position: absolute;
        background: radial-gradient(circle, #2196F3 0%, transparent 70%);
        border-radius: 50%;
        animation: moveParticle linear infinite;
    }

    /* Animation de mouvement des particules */
    @keyframes moveParticle {
        0% {
            transform: translate(0, 0) scale(0.5);
            opacity: 0;
        }
        25% {
            opacity: 1;
        }
        100% {
            transform: translate(var(--x), var(--y)) scale(1.5);
            opacity: 0;
        }
    }

    /* Animation au clic/toucher */
    .click-animation {
        position: absolute;
        width: 40px;
        height: 40px;
        border: 2px solid #4CAF50;
        border-radius: 50%;
        pointer-events: none;
        animation: clickRipple 0.6s ease-out;
        z-index: 10;
    }

    @keyframes clickRipple {
        0% {
            transform: scale(0.5);
            opacity: 1;
        }
        100% {
            transform: scale(2.5);
            opacity: 0;
        }
    }

    /* Style pour l'icône dans les boutons */
    .icon {
        margin-right: 8px;
        font-size: 1.2em;
    }

    /* Animation de rotation pour l'icône de chargement */
    .fa-spin {
        animation: fa-spin 2s infinite linear;
    }
    @keyframes fa-spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(359deg); }
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

  <div class="background-animation" id="backgroundAnimation"></div>

  <h1><i class="fas fa-check-circle icon"></i>Paiement initié avec succès !</h1>
  <p>Vous venez d’effectuer un paiement pour <strong>SOCIAL BOOST HORIZON</strong>. Si vous avez validé le prélèvement sur votre téléphone, cliquez ci-dessous pour actualiser et synchroniser votre solde immédiatement.</p>
  
  <div id="statusMessage" class="status-msg"></div>

  <div class="btn-group">
    <button id="verifyBtn" class="btn btn-primary" onclick="verifyPayment()">
      <i id="verifyIcon" class="fas fa-sync-alt icon"></i> Vérifier mon solde
    </button>
    <a href="/" class="btn btn-secondary">
      <i class="fas fa-home icon"></i>Tableau de bord
    </a>
  </div>

  <script>
    // --- Configuration de l'URL Backend ---
    const BACKEND_URL = ''; // Laisse vide si l'API est sur le même nom de domaine

    // --- Fonction principale de vérification du paiement ---
    async function verifyPayment() {
      // On récupère la transaction en attente enregistrée dans le localStorage par la page paid.html
      const pendingTx = localStorage.getItem('pendingPayment');
      const statusDiv = document.getElementById('statusMessage');
      const verifyIcon = document.getElementById('verifyIcon');
      const verifyBtn = document.getElementById('verifyBtn');

      if (!pendingTx) {
        statusDiv.innerHTML = "<span class='error-text'><i class='fas fa-exclamation-triangle'></i> Aucune transaction récente détectée sur cet appareil.</span>";
        return;
      }

      try {
        const txData = JSON.parse(pendingTx);
        
        // Démarrage de l'état visuel de chargement
        verifyIcon.classList.add('fa-spin');
        verifyBtn.disabled = true;
        statusDiv.innerHTML = "<span class='pending-text'><i class='fas fa-spinner fa-spin'></i> Interrogation en direct de l'opérateur de paiement...</span>";

        // Appel à notre nouvelle API confirm-swychr.js optimisée
        const response = await fetch(`${BACKEND_URL}/api/confirm-swychr?transactionId=${txData.transactionId}`);
        const data = await response.json();

        if (data.isPaid) {
          statusDiv.innerHTML = "<span class='success-text'><i class='fas fa-check-double'></i> Super ! Votre paiement est validé et votre solde a été mis à jour.</span>";
          localStorage.removeItem('pendingPayment'); // Nettoyage de la mémoire locale puisque c'est un succès
        } else {
          statusDiv.innerHTML = "<span class='pending-text'><i class='fas fa-clock'></i> L'opérateur n'a pas encore validé le transfert. Réessayez dans 20 secondes s'il vous plaît.</span>";
        }
      } catch (error) {
        console.error("Erreur de vérification :", error);
        statusDiv.innerHTML = "<span class='error-text'><i class='fas fa-times-circle'></i> Impossible de joindre le serveur. Réessayez.</span>";
      } finally {
        // Arrêt de l'état de chargement
        verifyIcon.classList.remove('fa-spin');
        verifyBtn.disabled = false;
      }
    }

    // Déclenche automatiquement une première vérification au chargement complet de la page
    window.addEventListener('load', () => {
        if(localStorage.getItem('pendingPayment')) {
            verifyPayment();
        }
    });

    // --- Script pour les animations de fond (Particules) ---
    const backgroundAnimation = document.getElementById('backgroundAnimation');
    const numberOfParticles = 30; // Nombre de particules simultanées

    function createParticle() {
      const particle = document.createElement('div');
      particle.classList.add('particle');
      
      // Taille aléatoire entre 5px et 15px
      const size = Math.random() * 10 + 5; 
      particle.style.width = `${size}px`;
      particle.style.height = `${size}px`;
      
      // Position initiale aléatoire
      particle.style.left = `${Math.random() * 100}vw`;
      particle.style.top = `${Math.random() * 100}vh`;
      
      // Variables CSS personnalisées pour la destination de l'animation
      particle.style.setProperty('--x', (Math.random() - 0.5) * 400 + 'vw');
      particle.style.setProperty('--y', (Math.random() - 0.5) * 400 + 'vh');
      
      // Durée de vie aléatoire entre 10s et 25s
      particle.style.animationDuration = `${Math.random() * 15 + 10}s`; 
      particle.style.animationDelay = `-${Math.random() * 10}s`; 
      
      backgroundAnimation.appendChild(particle);

      // Recréation en boucle pour maintenir le flux continu
      particle.addEventListener('animationend', () => {
        particle.remove();
        createParticle(); 
      });
    }

    // Initialisation du fond étoilé / particulaire
    for (let i = 0; i < numberOfParticles; i++) {
      createParticle();
    }

    // --- Script pour l'animation d'onde de choc au clic/toucher ---
    function triggerRipple(clientX, clientY) {
      const clickAnimation = document.createElement('div');
      clickAnimation.classList.add('click-animation');
      clickAnimation.style.left = `${clientX - 20}px`;
      clickAnimation.style.top = `${clientY - 20}px`;
      document.body.appendChild(clickAnimation);
      
      clickAnimation.addEventListener('animationend', () => {
        clickAnimation.remove();
      });
    }

    document.addEventListener('click', (e) => {
      // Évite de déclencher l'animation si on clique spécifiquement sur un bouton cliquable
      if (!e.target.closest('.btn')) {
        triggerRipple(e.clientX, e.clientY);
      }
    });

    document.addEventListener('touchstart', (e) => {
      Array.from(e.changedTouches).forEach(touch => {
        if (!touch.target.closest('.btn')) {
          triggerRipple(touch.clientX, touch.clientY);
        }
      });
    });
  </script>
</body>
</html>
