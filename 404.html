<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Introuvable - Social Boost Horizon</title>
    <style>
        /* 1. Configuration de base et police */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        /* Animation du fond d'écran */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. La carte centrale (Effet verre / Glassmorphism) */
        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 90%;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 3. L'image SVG animée */
        .svg-illustration {
            width: 150px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* 4. Textes */
        .company-name {
            font-size: 1.2rem;
            color: #e73c7e;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            color: #333;
            line-height: 1;
        }

        p {
            font-size: 1.1rem;
            color: #666;
            margin: 20px 0 30px;
            line-height: 1.6;
        }

        /* 5. Les Boutons */
        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
        }

        .btn-primary {
            background: #23a6d5;
            color: white;
            box-shadow: 0 4px 15px rgba(35, 166, 213, 0.4);
        }

        .btn-primary:hover {
            background: #1b85ab;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(35, 166, 213, 0.6);
        }

        .btn-secondary {
            background: white;
            color: #333;
            border: 2px solid #ddd;
        }

        .btn-secondary:hover {
            border-color: #23a6d5;
            color: #23a6d5;
            transform: translateY(-3px);
        }

    </style>
</head>
<body>

    <div class="container">
        <svg class="svg-illustration" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 20C15.5228 20 20 15.5228 20 10C20 4.47715 15.5228 0 10 0C4.47715 0 0 4.47715 0 10C0 15.5228 4.47715 20 10 20Z" fill="#23a6d5" opacity="0.2"/>
            <path d="M21 21L15 15" stroke="#e73c7e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M10 18C14.4183 18 18 14.4183 18 10C18 5.58172 14.4183 2 10 2C5.58172 2 2 5.58172 2 10C2 14.4183 5.58172 18 10 18Z" stroke="#23a6d5" stroke-width="3"/>
            <path d="M7 9H7.01M13 9H13.01" stroke="#333" stroke-width="3" stroke-linecap="round"/>
            <path d="M8 13.5C8 13.5 9 12.5 10 12.5C11 12.5 12 13.5 12 13.5" stroke="#333" stroke-width="2" stroke-linecap="round"/>
        </svg>

        <div class="company-name">Social Boost Horizon</div>
        <h1>404</h1>
        <h2>Oups ! Quelque chose a mal tourné.</h2>
        <p>Il semblerait que cette page n'existe pas encore ou que notre équipe soit en plein travail dessus. Ne vous inquiétez pas, vous n'êtes pas perdu !</p>
        
        <div class="buttons-container">
            <button onclick="history.back()" class="btn btn-secondary">Retour</button>
            
            <a href="index.html" class="btn btn-primary">Aller à l'accueil</a>
            
            <a href="dashboard.html" class="btn btn-primary">Tableau de bord</a>
        </div>
    </div>

</body>
</html>
