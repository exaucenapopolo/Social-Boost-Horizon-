  <style>
    :root {
      --sbh-deep-blue: #080e1a;
      --sbh-gradient-start: #1e3c72;
      --sbh-gradient-end: #6a0dad;
      --sbh-btn-color: #1E90FF;
      --sbh-light-blue: #4DA6FF;
      --sbh-gold: #D4AF37;
      --sbh-gold-deep: #B8860B;
      --glass-bg: rgba(20, 30, 50, 0.6);
      --glass-border: rgba(255, 255, 255, 0.1);
      --input-bg: rgba(255, 255, 255, 0.08);
      --text-white: #FFFFFF;
      --text-light: rgba(255, 255, 255, 0.85);
      --error-color: #ff4d4d;
      --success-color: #4CAF50;
      --font-primary: 'Plus Jakarta Sans', sans-serif;
      --font-display: 'Space Grotesk', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 14px; scroll-behavior: smooth; }
    @media (min-width: 768px) { html { font-size: 15px; } }
    @media (max-width: 480px) { html { font-size: 13px; } }

    body {
      font-family: var(--font-primary);
      color: var(--text-white);
      background: var(--sbh-deep-blue);
      position: relative;
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    .background-animation {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
      background: radial-gradient(ellipse at 30% 50%, #0f2040 0%, #080e1a 70%);
    }
    .bg-grid {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
      background-image: linear-gradient(rgba(77,166,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(77,166,255,0.05) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8, 14, 26, 0.85); backdrop-filter: blur(20px);
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.7rem 1.8rem; border-bottom: 1px solid var(--glass-border);
    }
    @media (max-width: 480px) { header { padding: 0.6rem 1rem; } }

    .logo-link { display: flex; align-items: center; text-decoration: none; gap: 10px; }
    .logo-img {
      height: 42px; width: 42px; border-radius: 50%; object-fit: cover;
      border: 2px solid var(--sbh-gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
    }
    @media (max-width: 480px) { .logo-img { height: 36px; width: 36px; } }
    .logo-text { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.15; }
    .logo-text .social { font-size: 0.8rem; font-weight: 600; color: #fff; letter-spacing: 1px; }
    .logo-text .boost { font-size: 1.4rem; font-weight: 800; color: var(--sbh-gold); line-height: 1; }
    @media (max-width: 480px) { .logo-text .boost { font-size: 1.2rem; } }
    .logo-text .horizon { font-size: 0.9rem; font-weight: 600; color: #fff; }

    .icon-hamburger { font-size: 1.6rem; cursor: pointer; transition: 0.3s; }
    .icon-hamburger:hover { color: var(--sbh-gold); }
    .mobile-menu {
      display: none; position: absolute; top: 65px; right: 1.8rem;
      background: rgba(10, 22, 43, 0.95); border: 1px solid var(--glass-border);
      border-radius: 16px; padding: 1.2rem; flex-direction: column; z-index: 200;
      min-width: 240px; backdrop-filter: blur(20px);
    }
    header.open .mobile-menu { display: flex; }
    .mobile-menu a { color: #fff; padding: 0.7rem 0.9rem; text-decoration: none; border-radius: 8px; transition: 0.3s; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; }
    .mobile-menu a:hover { background: rgba(30, 60, 114, 0.5); transform: translateX(5px); }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: linear-gradient(135deg, var(--sbh-gradient-start), var(--sbh-btn-color));
      color: #fff; padding: 0.7rem 1.7rem; border: none; border-radius: 50px;
      text-decoration: none; font-weight: 600; transition: all 0.3s ease; font-size: 0.95rem;
      box-shadow: 0 4px 15px rgba(30, 144, 255, 0.3); letter-spacing: 0.5px;
      cursor: pointer; position: relative; overflow: hidden; z-index: 1;
    }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(30, 144, 255, 0.5); }
    .btn-outline { background: transparent; border: 2px solid var(--sbh-light-blue); box-shadow: none; }
    .btn-outline:hover { background: var(--sbh-light-blue); border-color: var(--sbh-light-blue); }
    .btn-google {
      background: #fff; color: #444; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .btn-google:hover { background: #f5f5f5; color: #000; }

    main {
      display: flex; justify-content: center; align-items: center;
      padding: 2rem 1rem; min-height: calc(100vh - 70px);
    }
    .form-container {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: 24px; padding: 2.5rem 2rem; max-width: 480px; width: 100%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px);
    }
    @media (max-width: 480px) { .form-container { padding: 1.8rem 1.3rem; } }
    .form-container h2 {
      font-family: var(--font-display); font-size: 1.8rem; text-align: center;
      margin-bottom: 0.5rem; color: var(--sbh-gold);
    }
    @media (max-width: 480px) { .form-container h2 { font-size: 1.5rem; } }
    .form-container p { text-align: center; margin-bottom: 1.5rem; font-size: 0.9rem; color: var(--text-light); }

    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-size: 0.9rem; margin-bottom: 0.4rem; color: #fff; font-weight: 500; }
    .form-group label i { color: var(--sbh-gold); margin-right: 6px; }
    .form-group input, .form-group select {
      width: 100%; padding: 12px 14px; border: 1px solid var(--glass-border);
      border-radius: 12px; background: var(--input-bg); color: #fff;
      font-size: 0.95rem; font-family: var(--font-primary); transition: 0.3s;
    }
    .form-group select { cursor: pointer; }
    .form-group select option { background: #1a2a45; color: #fff; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--sbh-light-blue); box-shadow: 0 0 0 3px rgba(77,166,255,0.15); }
    .form-group input::placeholder { color: rgba(255,255,255,0.4); }
    .phone-group { display: flex; gap: 10px; }
    .phone-group input:first-child { max-width: 100px; }
    @media (max-width: 480px) { .phone-group { flex-direction: column; } .phone-group input:first-child { max-width: 100%; } }
    .error { color: var(--error-color); font-size: 0.8rem; margin-top: 5px; display: none; }
    .success { color: var(--success-color); font-size: 0.8rem; margin-top: 5px; display: none; }

    .btn-container { margin-top: 1.8rem; display: flex; flex-direction: column; gap: 12px; }
    .btn-container button { width: 100%; }
    .divider {
      display: flex; align-items: center; text-align: center; margin: 18px 0;
      color: rgba(255,255,255,0.5); font-size: 0.85rem;
    }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--glass-border); }
    .divider:not(:empty)::before { margin-right: 1rem; }
    .divider:not(:empty)::after { margin-left: 1rem; }
    .link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; }
    .link a { color: var(--sbh-light-blue); text-decoration: none; transition: color 0.3s; }
    .link a:hover { text-decoration: underline; }

    footer {
      background: rgba(8, 14, 26, 0.9); border-top: 1px solid var(--glass-border);
      padding: 2rem 1rem; text-align: center;
    }
    .footer-bottom { font-size: 0.85rem; color: rgba(255,255,255,0.7); }
    .footer-bottom a { color: rgba(255,255,255,0.7); text-decoration: none; transition: color 0.3s; margin: 0 0.5rem; }
    .footer-bottom a:hover { color: #fff; }

    .notification {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      padding: 14px 24px; border-radius: 12px; color: #fff; font-weight: 600;
      z-index: 1000; opacity: 0; transition: opacity 0.3s, top 0.3s;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3); font-size: 0.9rem;
    }
    .notification.show { opacity: 1; top: 30px; }
    .notification.success { background: #2e7d32; }
    .notification.error { background: #c62828; }

    .loader {
      display: none; width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%; border-top: 3px solid #fff; animation: spin 0.8s linear infinite;
      position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
    }
    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
    .btn-loading .loader { display: block; }
    .btn-loading .btn-text { opacity: 0.6; }
    .btn { position: relative; }
  </style>
</head>

  <footer>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script>
    function showNotification(message, type) {
      const n = document.getElementById('notification');
      document.getElementById('notification-message').textContent = message;
      n.className = 'notification ' + type;
      setTimeout(() => n.classList.add('show'), 100);
      setTimeout(() => n.classList.remove('show'), 5000);
    }

    const firebaseConfig = {
      apiKey: "AIzaSyD2JiDS0g8EkeNXxjO7_wGI3WznpPvcCCk",
      authDomain: "social-boost-horizon.firebaseapp.com",
      projectId: "social-boost-horizon",
      storageBucket: "social-boost-horizon.appspot.com",
      messagingSenderId: "43658165639",
      appId: "1:43658165639:web:b8f492dc6a25cd12fc6722"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();
    const BACKEND_URL = window.location.hostname.includes('localhost') 
      ? 'http://localhost:5000' : 'https://social-boost-exaucenapopolo2.replit.app';
    let isRegisteringWithEmail = false;
    let isProcessingGoogleAuth = false;

    async function handleGoogleUser(user) {
      if (!user) return false;
      const userId = user.uid;
      const email = user.email || '';
      try {
        const userDoc = await db.collection('users').doc(userId).get();
        if (userDoc.exists) return true;
        const emailQuery = await db.collection('users').where('email', '==', email).limit(1).get();
        if (!emailQuery.empty) {
          await db.collection('users').doc(emailQuery.docs[0].id).update({ googleUid: userId });
          return true;
        }
        const displayName = user.displayName || '';
        const username = displayName ? displayName.replace(/\s+/g, '_').toLowerCase() : (email.split('@')[0] || userId);
        const referralCode = Math.random().toString(36).substring(2,10).toUpperCase();
        const urlParams = new URLSearchParams(window.location.search);
        const referralCodeUsed = urlParams.get('ref') || null;
        await db.collection('users').doc(userId).set({
          userId, username, email, phone: '', country: '',
          referralCode, referredBy: referralCodeUsed,
          balance: 0, referralBalance: 0, discountUsesLeft: 10, referralsCount: 0,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          provider: 'google', isFirstAccess: true, openedChests: []
        });
        return true;
      } catch (err) { return true; }
    }

    auth.onAuthStateChanged(async (user) => {
      if (isRegisteringWithEmail || isProcessingGoogleAuth) return;
      if (user) {
        isProcessingGoogleAuth = true;
        const success = await handleGoogleUser(user);
        if (success) {
          showNotification('✅ Authentifié, redirection...', 'success');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
        }
      }
    });

    document.getElementById('googleSignup').addEventListener('click', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('googleSignup');
      btn.classList.add('btn-loading');
      try {
        const result = await firebase.auth().signInWithPopup(provider);
        if (result && result.user) showNotification('✅ Inscription Google réussie !', 'success');
      } catch (error) {
        if (error.code === 'auth/popup-closed-by-user') showNotification('⚠️ Inscription annulée', 'error');
        else if (error.code === 'auth/popup-blocked') showNotification('❌ Popup bloquée. Autorisez les popups.', 'error');
        else showNotification(`❌ ${error.message}`, 'error');
      } finally { btn.classList.remove('btn-loading'); }
    });

    function updateIndicatif() {
      const codes = { bj:'+229',bf:'+226',cm:'+237',ca:'+1',cf:'+236',cg:'+242',ci:'+225',ga:'+241',ke:'+254',mw:'+265',ne:'+227',ng:'+234',ug:'+256',cd:'+243',rw:'+250',sn:'+221',tz:'+255',tg:'+228',zm:'+260' };
      document.getElementById('indicatif').value = codes[document.getElementById('pays').value] || '';
    }

    async function checkAndFillReferralCode() {
      const urlParams = new URLSearchParams(window.location.search);
      const refCodeFromUrl = urlParams.get('ref');
      const referralInput = document.getElementById('referral');
      const referralSuccess = document.getElementById('referralSuccess');
      const referrerNameGroup = document.getElementById('referrerNameGroup');
      const referrerNameInput = document.getElementById('referrerName');
      if (refCodeFromUrl) {
        referralInput.value = refCodeFromUrl.toUpperCase();
        referralInput.readOnly = true;
        referralInput.style.background = 'rgba(76, 175, 80, 0.1)';
        referralInput.style.borderColor = '#4CAF50';
        referralInput.style.color = '#4CAF50';
        referralInput.style.fontWeight = '600';
        try {
          const q = await db.collection('users').where('referralCode', '==', refCodeFromUrl.toUpperCase()).limit(1).get();
          if (!q.empty) {
            const d = q.docs[0].data();
            referrerNameGroup.style.display = 'block';
            referrerNameInput.value = `✅ ${d.username || 'Utilisateur'}`;
            referralSuccess.textContent = `✅ Parrainé par ${d.username || 'Utilisateur'}`;
            referralSuccess.style.display = 'block';
          }
        } catch (e) {}
      }
    }

    document.getElementById('referral').addEventListener('blur', async function() {
      const code = this.value.trim();
      if (!code) return;
      const success = document.getElementById('referralSuccess');
      const grp = document.getElementById('referrerNameGroup');
      const inp = document.getElementById('referrerName');
      success.textContent = ''; success.style.display = 'none'; grp.style.display = 'none';
      try {
        const q = await db.collection('users').where('referralCode', '==', code.toUpperCase()).limit(1).get();
        if (!q.empty) {
          const d = q.docs[0].data();
          grp.style.display = 'block'; inp.value = `✅ ${d.username || 'Utilisateur'}`;
          success.textContent = `✅ Parrainé par ${d.username || 'Utilisateur'}`;
          success.style.display = 'block';
        } else { success.textContent = '⚠️ Code invalide'; success.style.color = '#ff4d4d'; success.style.display = 'block'; }
      } catch (e) {}
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      btn.classList.add('btn-loading');
      document.querySelectorAll('.error').forEach(el => { el.textContent = ''; el.style.display = 'none'; });
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const pays = document.getElementById('pays').value;
      const indicatif = document.getElementById('indicatif').value;
      const telephone = document.getElementById('telephone').value.trim();
      const referral = document.getElementById('referral').value.trim();
      let valid = true;
      if (!username) { document.getElementById('usernameError').textContent = 'Requis'; document.getElementById('usernameError').style.display = 'block'; valid = false; }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { document.getElementById('emailError').textContent = 'Email invalide'; document.getElementById('emailError').style.display = 'block'; valid = false; }
      if (!pays) { document.getElementById('countryError').textContent = 'Requis'; document.getElementById('countryError').style.display = 'block'; valid = false; }
      if (!telephone) { document.getElementById('phoneError').textContent = 'Requis'; document.getElementById('phoneError').style.display = 'block'; valid = false; }
      if (password.length < 6) { document.getElementById('passwordError').textContent = '6 caractères minimum'; document.getElementById('passwordError').style.display = 'block'; valid = false; }
      if (!valid) { btn.classList.remove('btn-loading'); return; }
      isRegisteringWithEmail = true;
      try {
        const { user } = await auth.createUserWithEmailAndPassword(email, password);
        const userId = user.uid;
        const generatedCode = Math.random().toString(36).substring(2,10).toUpperCase();
        const referralCodeUsed = referral || new URLSearchParams(location.search).get('ref') || null;
        if (referralCodeUsed) {
          const response = await fetch(`${BACKEND_URL}/register`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId, username, email, phone: `${indicatif} ${telephone}`, country: pays, referralCode: generatedCode, referralCodeUsed: referralCodeUsed.toUpperCase(), welcomeModalShown: false, isFirstAccess: true, openedChests: [], balance: 0 })
          });
          if (!response.ok) throw new Error('Erreur serveur');
        } else {
          await db.collection('users').doc(userId).set({
            userId, username, email, phone: `${indicatif} ${telephone}`, country: pays,
            referralCode: generatedCode, referredBy: null, balance: 0, referralBalance: 0,
            discountUsesLeft: 10, referralsCount: 0,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            provider: 'email', welcomeModalShown: false, isFirstAccess: true, openedChests: []
          });
        }
        showNotification('✅ Inscription réussie !', 'success');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
      } catch (error) {
        isRegisteringWithEmail = false;
        let msg = "Erreur";
        if (error.code === 'auth/email-already-in-use') msg = "Cet email est déjà utilisé";
        else msg = error.message;
        showNotification(`❌ ${msg}`, 'error');
      } finally { btn.classList.remove('btn-loading'); }
    });

    document.addEventListener("DOMContentLoaded", () => {
      AOS.init({ duration: 800, once: true, offset: 50 });
      const header = document.querySelector("header");
      document.querySelector(".icon-hamburger").addEventListener("click", () => header.classList.toggle("open"));
      document.addEventListener("click", (e) => { if (!header.contains(e.target) && header.classList.contains("open")) header.classList.remove("open"); });
      checkAndFillReferralCode();
    });
  </script>
</body>
</html>
