<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <meta name="description" content="Créez votre compte sur Social Boost Horizon">
  <meta property="og:title" content="Inscription - Social Boost Horizon">
  <meta property="og:description" content="Rejoignez notre communauté et boostez votre présence sur les réseaux sociaux.">
  <meta property="og:image" content="https://raw.githubusercontent.com/exaucenapopolo/Social-Boost-Horizon-/refs/heads/main/assets/logos/Logo%20social%20Boost%20horizon.jpg">
  <title>Inscription – Social Boost Horizon</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <style>
    :root {
      --sbh-deep-blue: #080e1a;
      --sbh-gradient-start: #1e3c72;
      --sbh-gradient-end: #6a0dad;
      --sbh-btn-color: #1E90FF;
      --sbh-light-blue: #4DA6FF;
      --sbh-gold: #D4AF37;
      --glass-bg: rgba(20, 30, 50, 0.6);
      --glass-border: rgba(255, 255, 255, 0.1);
      --input-bg: rgba(255, 255, 255, 0.08);
      --text-white: #FFFFFF;
      --text-light: rgba(255, 255, 255, 0.85);
      --error-color: #ff8080; /* Rouge plus clair pour être visible sur fond sombre */
      --success-color: #4CAF50;
      --font-primary: 'Plus Jakarta Sans', sans-serif;
      --font-display: 'Space Grotesk', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 14px; scroll-behavior: smooth; }
    @media (min-width: 768px) { html { font-size: 15px; } }

    body {
      font-family: var(--font-primary);
      color: var(--text-white);
      background: var(--sbh-deep-blue);
      position: relative;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .background-animation {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
      background: radial-gradient(ellipse at 30% 50%, #0f2040 0%, #080e1a 70%);
    }

    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8, 14, 26, 0.85); backdrop-filter: blur(20px);
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.7rem 1.8rem; border-bottom: 1px solid var(--glass-border);
    }
    
    .logo-link { display: flex; align-items: center; text-decoration: none; gap: 10px; }
    .logo-img { height: 42px; width: 42px; border-radius: 50%; border: 2px solid var(--sbh-gold); }
    .logo-text { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.15; }
    .logo-text .social { font-size: 0.8rem; font-weight: 600; color: #fff; }
    .logo-text .boost { font-size: 1.4rem; font-weight: 800; color: var(--sbh-gold); }
    .logo-text .horizon { font-size: 0.9rem; font-weight: 600; color: #fff; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: linear-gradient(135deg, var(--sbh-gradient-start), var(--sbh-btn-color));
      color: #fff; padding: 0.8rem 1.7rem; border: none; border-radius: 12px;
      text-decoration: none; font-weight: 600; transition: all 0.3s ease; font-size: 0.95rem;
      cursor: pointer; position: relative; overflow: hidden; width: 100%;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(30, 144, 255, 0.4); }
    
    .btn-verify {
      width: auto; padding: 0 1.2rem; background: transparent; border: 1px solid var(--sbh-light-blue);
      color: var(--sbh-light-blue); border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s;
    }
    .btn-verify:hover { background: rgba(77, 166, 255, 0.1); }

    .btn-google { background: #fff; color: #444; }
    .btn-google:hover { background: #f5f5f5; color: #000; }

    main { display: flex; justify-content: center; align-items: center; padding: 2rem 1rem; min-height: 80vh; }
    .form-container {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: 24px; padding: 2.5rem 2rem; max-width: 480px; width: 100%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px);
    }
    
    .form-container h2 { font-family: var(--font-display); font-size: 1.8rem; text-align: center; color: var(--sbh-gold); margin-bottom: 0.5rem; }
    .form-container p { text-align: center; margin-bottom: 1.5rem; font-size: 0.9rem; color: var(--text-light); }

    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-size: 0.9rem; margin-bottom: 0.4rem; color: #fff; font-weight: 500; }
    .form-group input, .form-group select {
      width: 100%; padding: 12px 14px; border: 1px solid var(--glass-border);
      border-radius: 12px; background: var(--input-bg); color: #fff;
      font-size: 0.95rem; font-family: var(--font-primary); transition: 0.3s;
    }
    .form-group select option { background: #1a2a45; color: #fff; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--sbh-light-blue); }
    
    .referral-group { display: flex; gap: 10px; }
    
    /* Messages d'erreur et succès très visibles */
    .error { color: var(--error-color); font-size: 0.85rem; margin-top: 6px; display: none; font-weight: 600; background: rgba(255, 77, 77, 0.1); padding: 8px; border-radius: 8px; border-left: 3px solid var(--error-color); }
    .success { color: var(--success-color); font-size: 0.85rem; margin-top: 6px; display: none; font-weight: 600; background: rgba(76, 175, 80, 0.1); padding: 8px; border-radius: 8px; border-left: 3px solid var(--success-color); }

    .divider { display: flex; align-items: center; text-align: center; margin: 18px 0; color: rgba(255,255,255,0.5); font-size: 0.85rem; }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--glass-border); }
    .divider:not(:empty)::before { margin-right: 1rem; }
    .divider:not(:empty)::after { margin-left: 1rem; }
    
    .link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; }
    .link a { color: var(--sbh-light-blue); text-decoration: none; }
    .link a:hover { text-decoration: underline; }

    /* Notification globale ultra claire */
    .notification {
      position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
      padding: 16px 28px; border-radius: 12px; color: #fff; font-weight: 600;
      z-index: 1000; opacity: 0; transition: all 0.4s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-size: 0.95rem; text-align: center; min-width: 300px;
    }
    .notification.show { opacity: 1; top: 20px; }
    .notification.success { background: #2e7d32; border: 1px solid #4caf50; }
    .notification.error { background: #c62828; border: 1px solid #f44336; }

    .loader {
      display: none; width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%; border-top: 3px solid #fff; animation: spin 0.8s linear infinite;
      position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
    }
    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
    .btn-loading .loader { display: block; }
    .btn-loading .btn-text { opacity: 0.4; }
  </style>
</head>
<body>
  <div class="background-animation"></div>
  <div id="notification" class="notification"><span id="notification-message"></span></div>

  <header>
    <a href="index.html" class="logo-link">
      <img src="https://raw.githubusercontent.com/exaucenapopolo/Social-Boost-Horizon-/refs/heads/main/assets/logos/Logo%20social%20Boost%20horizon.jpg" alt="Logo" class="logo-img">
      <div class="logo-text">
        <span class="social">SOCIAL</span>
        <span class="boost">BOOST</span>
        <span class="horizon">HORIZON</span>
      </div>
    </a>
  </header>

  <main>
    <div class="form-container" data-aos="fade-up">
      <h2>Créer un compte</h2>
      <p>Inscription rapide et facile</p>
      <form id="registerForm" novalidate>
        
        <div class="form-group">
          <label for="email"><i class="fas fa-envelope"></i> Adresse Email</label>
          <input type="email" id="email" required placeholder="votre@email.com">
          <div class="error" id="emailError"></div>
        </div>

        <div class="form-group">
          <label for="pays"><i class="fas fa-globe"></i> Pays</label>
          <select id="pays" required>
            <option value="">— Sélectionnez votre pays —</option>
            <optgroup label="Afrique">
                <option value="bj">Bénin 🇧🇯</option>
                <option value="bf">Burkina Faso 🇧🇫</option>
                <option value="cm">Cameroun 🇨🇲</option>
                <option value="cf">Centrafrique 🇨🇫</option>
                <option value="cg">Congo Brazzaville 🇨🇬</option>
                <option value="cd">RDC 🇨🇩</option>
                <option value="ci">Côte d'Ivoire 🇨🇮</option>
                <option value="ga">Gabon 🇬🇦</option>
                <option value="gn">Guinée 🇬🇳</option>
                <option value="ml">Mali 🇲🇱</option>
                <option value="ne">Niger 🇳🇪</option>
                <option value="ng">Nigéria 🇳🇬</option>
                <option value="sn">Sénégal 🇸🇳</option>
                <option value="tg">Togo 🇹🇬</option>
            </optgroup>
            <optgroup label="Europe & Amérique">
                <option value="fr">France 🇫🇷</option>
                <option value="be">Belgique 🇧🇪</option>
                <option value="ch">Suisse 🇨🇭</option>
                <option value="ca">Canada 🇨🇦</option>
                <option value="us">États-Unis 🇺🇸</option>
            </optgroup>
            <option value="ailleurs">Ailleurs dans le monde 🌍</option>
          </select>
          <div class="error" id="countryError"></div>
        </div>

        <div class="form-group">
          <label for="referral"><i class="fas fa-gift"></i> Code de parrainage (Optionnel)</label>
          <div class="referral-group">
            <input type="text" id="referral" placeholder="Ex: A1B2C3D4">
            <button type="button" id="verifyReferralBtn" class="btn-verify">Vérifier</button>
          </div>
          <div class="success" id="referralSuccess"></div>
          <div class="error" id="referralError"></div>
        </div>

        <div class="form-group">
          <label for="password"><i class="fas fa-lock"></i> Mot de passe</label>
          <input type="password" id="password" required minlength="6" placeholder="•••••• (6 caractères minimum)">
          <div class="error" id="passwordError"></div>
        </div>

        <div style="margin-top: 1.8rem; display: flex; flex-direction: column; gap: 12px;">
          <button type="submit" class="btn" id="registerBtn"><span class="btn-text">Créer mon compte</span><div class="loader"></div></button>
          <div class="divider">OU</div>
          <button type="button" class="btn btn-google" id="googleSignup"><i class="fab fa-google"></i> <span class="btn-text">Inscription via Google</span><div class="loader"></div></button>
        </div>
        
        <div class="link">Déjà membre ? <a href="login.html">Se connecter</a></div>
      </form>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script>
    // --- Système de notification robuste ---
    let notificationTimeout;
    function showNotification(message, type, duration = 6000) {
      const n = document.getElementById('notification');
      const msgSpan = document.getElementById('notification-message');
      
      clearTimeout(notificationTimeout);
      msgSpan.textContent = message;
      n.className = `notification ${type}`;
      
      n.offsetHeight; // Reflow pour redémarrer l'animation
      n.classList.add('show');
      
      notificationTimeout = setTimeout(() => { n.classList.remove('show'); }, duration);
    }

    function showFieldError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideAllErrors() {
      document.querySelectorAll('.error, .success').forEach(el => { 
        el.textContent = ''; 
        el.style.display = 'none'; 
      });
    }

    // --- Configuration Firebase ---
    const firebaseConfig = {
      apiKey: "AIzaSyD2JiDS0g8EkeNXxjO7_wGI3WznpPvcCCk",
      authDomain: "social-boost-horizon.firebaseapp.com",
      projectId: "social-boost-horizon",
      storageBucket: "social-boost-horizon.appspot.com",
      messagingSenderId: "43658165639",
      appId: "1:43658165639:web:b8f492dc6a25cd12fc6722"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();
    
    let isRegistering = false;

    // --- Vérification du parrainage par BOUTON ---
    document.getElementById('verifyReferralBtn').addEventListener('click', async () => {
      const code = document.getElementById('referral').value.trim();
      const errorDiv = document.getElementById('referralError');
      const successDiv = document.getElementById('referralSuccess');
      
      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';

      if (!code) {
        errorDiv.textContent = "Veuillez entrer un code avant de vérifier.";
        errorDiv.style.display = 'block';
        return;
      }

      const btn = document.getElementById('verifyReferralBtn');
      btn.textContent = "...";
      btn.disabled = true;

      try {
        const q = await db.collection('users').where('referralCode', '==', code.toUpperCase()).limit(1).get();
        if (!q.empty) {
          const data = q.docs[0].data();
          successDiv.textContent = `✅ Code valide ! Vous êtes parrainé par : ${data.username || 'un membre'}`;
          successDiv.style.display = 'block';
        } else {
          errorDiv.textContent = "❌ Ce code de parrainage n'est détenu par aucun de nos membres. Assurez-vous d'avoir le bon code ou laissez ce champ vide.";
          errorDiv.style.display = 'block';
          document.getElementById('referral').value = ''; // On vide le champ car il est mauvais
        }
      } catch (e) {
        errorDiv.textContent = "Erreur de vérification. Veuillez réessayer.";
        errorDiv.style.display = 'block';
      } finally {
        btn.textContent = "Vérifier";
        btn.disabled = false;
      }
    });

    // --- Base de données : Création du profil utilisateur ---
    async function createUserProfile(user, country, referralCodeUsed) {
      const userId = user.uid;
      const email = user.email;
      // Comme on a enlevé le nom d'utilisateur, on le génère à partir de l'email (ex: jean@mail.com -> jean)
      const generatedUsername = email.split('@')[0].replace(/[^a-zA-Z0-9]/g, '');
      const newReferralCode = Math.random().toString(36).substring(2,10).toUpperCase();

      try {
        await db.collection('users').doc(userId).set({
          userId: userId,
          username: generatedUsername,
          email: email,
          country: country || '',
          referralCode: newReferralCode,
          referredBy: referralCodeUsed || null,
          balance: 0,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          isFirstAccess: true
        }, { merge: true });
        return true;
      } catch (err) {
        console.error("Erreur d'enregistrement profil:", err);
        return false;
      }
    }

    // --- Soumission du formulaire Email/Mot de passe ---
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (isRegistering) return;
      
      hideAllErrors();
      
      const email = document.getElementById('email').value.trim();
      const pays = document.getElementById('pays').value;
      const referralCode = document.getElementById('referral').value.trim();
      const password = document.getElementById('password').value;
      
      let valid = true;
      if (!email) { showFieldError('emailError', 'L\'adresse email est requise.'); valid = false; }
      if (!pays) { showFieldError('countryError', 'Veuillez sélectionner votre pays.'); valid = false; }
      if (password.length < 6) { showFieldError('passwordError', 'Le mot de passe doit faire au moins 6 caractères.'); valid = false; }
      
      if (!valid) return;
      
      isRegistering = true;
      const btn = document.getElementById('registerBtn');
      btn.classList.add('btn-loading');
      
      try {
        // 1. Création du compte Firebase Auth
        const userCred = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCred.user;
        
        // 2. Création du profil dans Firestore
        const success = await createUserProfile(user, pays, referralCode);
        
        if (success) {
          showNotification('🎉 Inscription réussie ! Redirection en cours...', 'success');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
        } else {
          await user.delete(); // Annule si la BDD échoue
          throw new Error("Impossible d'initialiser votre profil.");
        }
      } catch (error) {
        // GESTION DES ERREURS TRES CLAIRES POUR L'UTILISATEUR
        if (error.code === 'auth/email-already-in-use') {
          showFieldError('emailError', '⚠️ Cette adresse email existe déjà. Veuillez utiliser une autre adresse ou connectez-vous.');
          showNotification('L\'email est déjà utilisé.', 'error');
        } 
        else if (error.code === 'auth/weak-password') {
          showFieldError('passwordError', '⚠️ Votre mot de passe est trop court. Il doit contenir au moins 6 caractères.');
        } 
        else if (error.code === 'auth/invalid-email') {
          showFieldError('emailError', '⚠️ Le format de votre adresse email est incorrect.');
        } 
        else {
          showNotification(`❌ Erreur: ${error.message || "Veuillez réessayer plus tard."}`, 'error');
        }
      } finally {
        btn.classList.remove('btn-loading');
        isRegistering = false;
      }
    });

    // --- Gestion de l'inscription Google ---
    document.getElementById('googleSignup').addEventListener('click', async () => {
      if (isRegistering) return;
      const btn = document.getElementById('googleSignup');
      btn.classList.add('btn-loading');
      isRegistering = true;
      
      try {
        const result = await auth.signInWithPopup(provider);
        const user = result.user;
        
        // On récupère le code de parrainage de l'URL si on utilise Google
        const urlParams = new URLSearchParams(window.location.search);
        const refCode = urlParams.get('ref');
        
        const success = await createUserProfile(user, '', refCode);
        
        if (success) {
          showNotification('🎉 Inscription via Google réussie !', 'success');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
        }
      } catch (error) {
        if (error.code !== 'auth/popup-closed-by-user') {
          showNotification(`❌ Erreur Google: ${error.message}`, 'error');
        }
      } finally {
        btn.classList.remove('btn-loading');
        isRegistering = false;
      }
    });

    // Auto-remplissage du code parrainage via l'URL
    document.addEventListener("DOMContentLoaded", () => {
      AOS.init({ duration: 800, once: true });
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.has('ref')) {
        document.getElementById('referral').value = urlParams.get('ref').toUpperCase();
        document.getElementById('verifyReferralBtn').click(); // Clique automatiquement sur le bouton pour vérifier le code de l'URL
      }
    });
  </script>
</body>
</html>
