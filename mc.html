<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBH Admin Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --bg-main: #080e1a;
            --bg-card: rgba(15, 25, 45, 0.85);
            --gold: #D4AF37;
            --blue: #4DA6FF;
            --green: #22c55e;
            --red: #ff4757;
            --text-light: #e2e8f0;
            --border: rgba(255, 255, 255, 0.08);
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg-main); color: var(--text-light); }
        #authOverlay {
            position: fixed; inset: 0; background: var(--bg-main); display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .auth-box {
            background: var(--bg-card); padding: 40px; border-radius: 16px; border: 1px solid var(--gold); text-align: center; box-shadow: 0 10px 40px rgba(212, 175, 55, 0.15); width: 100%; max-width: 400px;
        }
        .auth-box input {
            width: 100%; padding: 15px; margin: 20px 0; background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: white; border-radius: 8px; text-align: center; font-size: 1.2rem; outline: none;
        }
        .auth-box input:focus { border-color: var(--gold); }
        .btn-primary {
            background: linear-gradient(135deg, #B8860B, var(--gold)); color: var(--bg-main); border: none; padding: 12px 30px; border-radius: 30px; font-weight: 800; cursor: pointer; transition: 0.3s; width: 100%;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); }
        .error-msg { color: var(--red); margin-top: 15px; display: none; font-size: 0.9rem; }
        #app { display: none; padding: 30px; max-width: 1600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .brand { font-size: 1.8rem; font-weight: 800; color: var(--gold); display: flex; align-items: center; gap: 10px; }
        .header-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-action { background: rgba(77, 166, 255, 0.1); border: 1px solid var(--blue); color: var(--blue); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        .btn-action:hover { background: var(--blue); color: white; }
        .btn-gold { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        .btn-gold:hover { background: var(--gold); color: var(--bg-main); }
        .btn-danger { border-color: var(--red); color: var(--red); background: rgba(255, 71, 87, 0.1); }
        .btn-danger:hover { background: var(--red); color: white; }
        .section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 30px; }
        .section-title { font-size: 1.2rem; font-weight: 600; border-left: 4px solid var(--gold); padding-left: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 12px 15px; border-bottom: 1px solid var(--border); text-align: left; }
        th { background: rgba(0,0,0,0.3); color: var(--gold); font-weight: 600; }
        tr:hover { background: rgba(255,255,255,0.02); }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge-mtp { background: rgba(77, 166, 255, 0.2); color: var(--blue); }
        .badge-exo { background: rgba(212, 175, 55, 0.2); color: var(--gold); }
        .badge-afb { background: rgba(255, 100, 100, 0.2); color: #ff6666; }
        .filter-bar { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
        .filter-bar select, .filter-bar input { padding: 8px 12px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: white; border-radius: 6px; font-size: 0.9rem; }
        .filter-bar select:focus, .filter-bar input:focus { border-color: var(--gold); outline: none; }
        .loading { text-align: center; padding: 40px; color: #94a3b8; }
        .footer-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .error-banner { background: rgba(255, 71, 87, 0.15); border: 1px solid var(--red); color: var(--red); padding: 10px 15px; border-radius: 8px; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="auth-box">
        <i class="fas fa-shield-halved" style="font-size: 3rem; color: var(--gold); margin-bottom: 15px;"></i>
        <h2>Accès Direction</h2>
        <p style="color:#94a3b8;">Veuillez entrer la clé de sécurité.</p>
        <input type="password" id="adminPass" placeholder="Mot de passe">
        <button class="btn-primary" onclick="unlock()">Déverrouiller</button>
        <div id="loginError" class="error-msg">Clé incorrecte.</div>
    </div>
</div>

<div id="app">
    <div class="header">
        <div class="brand"><i class="fas fa-bolt"></i> SBH Command Center</div>
        <div class="header-actions">
            <button class="btn-action" onclick="refreshAll()"><i class="fas fa-sync-alt"></i> Actualiser</button>
            <button class="btn-action btn-danger" onclick="logout()"><i class="fas fa-lock"></i> Verrouiller</button>
        </div>
    </div>

    <div id="errorBanner" class="error-banner"></div>

    <!-- Services -->
    <div class="section">
        <div class="section-title">
            Services & Analyse des prix (En direct des partenaires)
            <div class="footer-actions">
                <button class="btn-action btn-gold" onclick="exportServicesPDF()"><i class="fas fa-file-pdf"></i> Exporter PDF</button>
            </div>
        </div>
        <div class="filter-bar">
            <select id="serviceFilter" onchange="filterServices()">
                <option value="all">Tous les partenaires</option>
                <option value="MTP">MTP</option>
                <option value="EXO">EXO</option>
                <option value="AfriqueBoost">AfriqueBoost</option>
            </select>
            <input type="text" id="serviceSearch" placeholder="Rechercher (nom)" oninput="filterServices()">
            <input type="text" id="serviceIdSearch" placeholder="Rechercher par ID" oninput="filterServices()">
            <select id="serviceLimit" onchange="filterServices()">
                <option value="10">10</option>
                <option value="25" selected>25</option>
                <option value="50">50</option>
                <option value="100">100</option>
                <option value="all">Tous</option>
            </select>
            <button class="btn-action" onclick="resetServiceFilters()">Réinitialiser</button>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>ID</th><th>Partenaire</th><th>Nom</th><th>Coût</th><th>Prix final</th><th>Bénéfice</th><th>Marge</th></tr>
                </thead>
                <tbody id="servicesBody"><tr><td colspan="7" class="loading">Chargement...</td></tr></tbody>
            </table>
        </div>
        <div class="footer-actions">
            <span class="badge" id="serviceStats"></span>
        </div>
    </div>

    <div style="text-align: center; padding: 20px 0; color: #94a3b8; border-top: 1px solid var(--border); font-size: 0.9rem;">
        <i class="fas fa-crown" style="color: var(--gold);"></i> Fondateur : <strong style="color: var(--gold);">NAPOPOLO EXAUCE</strong> &nbsp;|&nbsp; Social Boost Horizon &copy; 2025
    </div>
</div>

<script>
    const ADMIN_PASS = '209644209644';
    let token = sessionStorage.getItem('sbh_admin_token');
    
    if (token) {
        document.getElementById('authOverlay').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        loadAll();
    }

    function unlock() {
        const pass = document.getElementById('adminPass').value;
        if (pass === ADMIN_PASS) {
            sessionStorage.setItem('sbh_admin_token', pass);
            token = pass;
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            loadAll();
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }

    function logout() {
        sessionStorage.removeItem('sbh_admin_token');
        location.reload();
    }

    function showError(msg) {
        const banner = document.getElementById('errorBanner');
        banner.textContent = msg;
        banner.style.display = 'block';
        setTimeout(() => { banner.style.display = 'none'; }, 8000);
    }

    async function fetchAdmin(endpoint) {
        try {
            const res = await fetch(`/api/admin${endpoint}`, {
                headers: { 'x-admin-password': token }
            });
            if (res.status === 403) {
                logout();
                throw new Error('Session expirée ou clé invalide.');
            }
            if (!res.ok) {
                const text = await res.text();
                throw new Error(`Erreur réseau (Code ${res.status}).`);
            }
            return await res.json();
        } catch (e) {
            console.error('Erreur fetchAdmin:', e);
            throw e;
        }
    }

    let allServices = [];

    async function loadAll() {
        try {
            await loadServices();
        } catch (e) {
            showError('Erreur lors du chargement des données : ' + e.message);
        }
    }

    async function refreshAll() {
        document.querySelectorAll('.loading').forEach(el => el.textContent = 'Chargement...');
        await loadAll();
    }

    // --- Services ---
    async function loadServices() {
        const data = await fetchAdmin('/services');
        if (data && data.success) {
            allServices = data.data.services || [];
            const stats = data.data.stats || {};
            document.getElementById('serviceStats').textContent =
                `Total: ${stats.total || 0} | Min: ${stats.minPrice || 0} FCFA | Max: ${stats.maxPrice || 0} FCFA | Moy: ${stats.avgPrice || 0} FCFA`;
            filterServices();
        }
    }

    function renderServices(services) {
        const tbody = document.getElementById('servicesBody');
        tbody.innerHTML = '';
        if (!services.length) {
            tbody.innerHTML = '<tr><td colspan="7" class="loading">Aucun service trouvé</td></tr>';
            return;
        }
        services.forEach(s => {
            let badge = '';
            if (s.provider === 'MTP') badge = 'badge-mtp';
            if (s.provider === 'EXO') badge = 'badge-exo';
            if (s.provider === 'AfriqueBoost') badge = 'badge-afb';

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${s.id}</td>
                <td><span class="badge ${badge}">${s.provider}</span></td>
                <td title="${s.name}">${s.name.substring(0, 40)}</td>
                <td>${s.providerCost.toLocaleString()} FCFA</td>
                <td style="font-weight:bold;color:var(--blue);">${s.finalPrice.toLocaleString()} FCFA</td>
                <td style="color:var(--green);">+${s.profit.toLocaleString()} FCFA</td>
                <td>${s.profitMargin}%</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function filterServices() {
        const filter = document.getElementById('serviceFilter').value;
        const search = document.getElementById('serviceSearch').value.toLowerCase();
        const idSearch = document.getElementById('serviceIdSearch').value.trim();
        const limit = document.getElementById('serviceLimit').value;

        let filtered = allServices;
        if (filter !== 'all') filtered = filtered.filter(s => s.provider === filter);
        if (search) filtered = filtered.filter(s => s.name.toLowerCase().includes(search));
        if (idSearch) filtered = filtered.filter(s => String(s.id).includes(idSearch));
        if (limit !== 'all') {
            const num = parseInt(limit);
            filtered = filtered.slice(0, num);
        }
        renderServices(filtered);
    }

    function resetServiceFilters() {
        document.getElementById('serviceFilter').value = 'all';
        document.getElementById('serviceSearch').value = '';
        document.getElementById('serviceIdSearch').value = '';
        document.getElementById('serviceLimit').value = '25';
        filterServices();
    }

    // --- Export PDF ---
    function addFooter(doc) {
        doc.setFontSize(10);
        doc.setTextColor(136, 136, 136);
        doc.text('Fondateur : NAPOPOLO EXAUCE', 14, doc.internal.pageSize.height - 10);
        doc.text('Social Boost Horizon © 2025', 14, doc.internal.pageSize.height - 5);
    }

    function exportServicesPDF() {
        if (!allServices || allServices.length === 0) return alert("Aucun service à exporter.");
        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18); doc.setTextColor(212, 175, 55); 
            doc.text("Rapport des Services - Social Boost Horizon", 14, 20);
            doc.setFontSize(10); doc.setTextColor(100); 
            doc.text(`Généré le ${new Date().toLocaleString('fr-FR')}`, 14, 28);
            const tableColumn = ["ID", "Partenaire", "Nom", "Cout", "Prix final", "Benefice", "Marge"];
            const tableRows = allServices.slice(0, 100).map(s => [
                s.id, s.provider, s.name.substring(0, 40), 
                `${s.providerCost} FCFA`, `${s.finalPrice} FCFA`, `+${s.profit} FCFA`, `${s.profitMargin}%`
            ]);
            doc.autoTable({ 
                head: [tableColumn], body: tableRows, startY: 35, theme: 'striped', 
                headStyles: { fillColor: [212, 175, 55], textColor: [8, 14, 26] }, 
                styles: { fontSize: 8 } 
            });
            addFooter(doc);
            doc.save('Services_SBH.pdf');
        } catch (e) {
            alert('Erreur export PDF Services : ' + e.message);
        }
    }
</script>
</body>
</html>
