<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration Centrale - Social Boost Horizon</title>
    
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
    <!-- Librairies pour Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* Variables de couleurs */
        :root {
            --sbh-deep-blue: #080e1a;
            --sbh-dark-blue: #0A162B;
            --sbh-gold: #D4AF37;
            --sbh-light-blue: #4DA6FF;
            --success-green: #22c55e;
            --glass-bg: rgba(15, 25, 45, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--sbh-deep-blue); color: #fff; }

        /* ÉCRAN DE VERROUILLAGE */
        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--sbh-deep-blue); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .auth-box { background: var(--glass-bg); padding: 40px; border-radius: 20px; border: 1px solid var(--sbh-gold); text-align: center; box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2); }
        .auth-box input { width: 100%; padding: 15px; margin: 20px 0; background: rgba(0,0,0,0.5); border: 1px solid var(--sbh-light-blue); color: white; border-radius: 8px; text-align: center; font-size: 1.2rem; }
        .btn-gold { background: linear-gradient(135deg, #B8860B, var(--sbh-gold)); color: var(--sbh-deep-blue); border: none; padding: 12px 30px; border-radius: 30px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); }

        /* DASHBOARD ADMIN */
        #adminDashboard { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .header-admin { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 20px; margin-bottom: 30px; }
        .logo-text { font-size: 1.5rem; font-weight: 800; color: var(--sbh-gold); }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 15px; padding: 20px; border-left: 4px solid var(--sbh-light-blue); }
        .kpi-value { font-size: 2.5rem; font-weight: 800; color: var(--success-green); margin-top: 10px; }
        .actions-panel { background: var(--glass-bg); padding: 20px; border-radius: 15px; border: 1px solid var(--glass-border); display: flex; gap: 15px; flex-wrap: wrap; }
        .btn-export { background: rgba(77, 166, 255, 0.1); border: 1px solid var(--sbh-light-blue); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-export:hover { background: var(--sbh-light-blue); }
        .error-msg { color: #ff6b9d; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <!-- Écran de connexion -->
    <div id="authOverlay">
        <div class="auth-box">
            <i class="fas fa-lock" style="font-size: 3rem; color: var(--sbh-gold); margin-bottom: 15px;"></i>
            <h2>Accès Administrateur</h2>
            <input type="password" id="adminPassInput" placeholder="Clé sécurisée">
            <button class="btn-gold" onclick="unlockDashboard()">Déverrouiller</button>
            <div id="loginError" class="error-msg">Clé incorrecte. Accès refusé.</div>
        </div>
    </div>

    <!-- Contenu du tableau de bord -->
    <div id="adminDashboard">
        <div class="header-admin">
            <div class="logo-text"><i class="fas fa-shield-alt"></i> SBH - COMMAND CENTER</div>
            <button class="btn-export" onclick="logoutAdmin()"><i class="fas fa-sign-out-alt"></i> Verrouiller</button>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card">
                <div><i class="fas fa-users"></i> Total Utilisateurs</div>
                <div class="kpi-value" id="kpi-users">--</div>
            </div>
            <div class="kpi-card" style="border-left-color: var(--sbh-gold);">
                <div><i class="fas fa-shopping-cart"></i> Total Commandes</div>
                <div class="kpi-value" id="kpi-orders" style="color: var(--sbh-gold);">--</div>
            </div>
            <div class="kpi-card" style="border-left-color: #ff6b9d;">
                <div><i class="fas fa-server"></i> Services Actifs (Exo)</div>
                <div class="kpi-value" id="kpi-services" style="color: #ff6b9d;">--</div>
            </div>
        </div>

        <div class="actions-panel">
            <h3 style="width: 100%; margin-top: 0;"><i class="fas fa-download"></i> Centre d'Actions</h3>
            <button class="btn-export" onclick="exportContactsCSV()">
                <i class="fas fa-address-book"></i> Télécharger Contacts (CSV)
            </button>
            <button class="btn-export" onclick="loadDashboardData()">
                <i class="fas fa-sync"></i> Actualiser les données
            </button>
        </div>
    </div>

    <script>
        // ICI : L'URL pointe désormais vers ton fichier unique !
        const API_BASE_URL = '/api/admin'; 
        let adminToken = sessionStorage.getItem('sbh_admin_token');

        if (adminToken) {
            showDashboard();
            loadDashboardData();
        }

        function unlockDashboard() {
            const pass = document.getElementById('adminPassInput').value;
            if (pass === '209644209644') {
                sessionStorage.setItem('sbh_admin_token', pass);
                adminToken = pass;
                showDashboard();
                loadDashboardData();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function showDashboard() {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
        }

        function logoutAdmin() {
            sessionStorage.removeItem('sbh_admin_token');
            location.reload();
        }

        // Fonction générique pour interroger notre unique fichier API
        async function fetchSecure(actionName) {
            // On ajoute l'action à la fin de l'URL : /api/admin?action=nomDeLAction
            const response = await fetch(`${API_BASE_URL}?action=${actionName}`, {
                headers: { 'x-admin-password': adminToken }
            });
            if (response.status === 403) {
                logoutAdmin();
                throw new Error("Session invalide");
            }
            return await response.json();
        }

        async function loadDashboardData() {
            try {
                // Action 1 : Stats
                const stats = await fetchSecure('stats');
                if (stats.success) {
                    document.getElementById('kpi-users').textContent = stats.data.totalUsers;
                    document.getElementById('kpi-orders').textContent = stats.data.totalOrders;
                }

                // Action 2 : Exo
                const exo = await fetchSecure('exo');
                if (exo.success) {
                    document.getElementById('kpi-services').textContent = exo.totalServices;
                }
            } catch (error) {
                console.error("Erreur", error);
            }
        }

        async function exportContactsCSV() {
            try {
                // Action 3 : Export
                const res = await fetchSecure('export');
                if (!res.success) throw new Error("Erreur serveur");

                let csvContent = "Nom,Telephone\n";
                res.contacts.forEach(contact => {
                    csvContent += `"${contact.name}","${contact.phone}"\n`;
                });

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `SBH_Contacts.csv`;
                link.click();

            } catch (error) {
                alert("Erreur lors de l'export des contacts.");
            }
        }
    </script>
</body>
</html>
