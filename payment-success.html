<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"/>
  <title>Statut du Paiement · Social Boost Horizon</title>

  <!-- Google Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <style>
    /* Harmonisation avec ton design pro */
    :root {
      --deep-blue: #080e1a;
      --dark-blue: #0A162B;
      --gold: #D4AF37;
      --gold-deep: #B8860B;
      --glass-bg: rgba(15, 25, 45, 0.65);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-white: #FFFFFF;
      --text-light: rgba(255, 255, 255, 0.8);
      --font-primary: 'Plus Jakarta Sans', sans-serif;
      --font-display: 'Space Grotesk', sans-serif;
      --success-color: #4CAF50;
      --warning-color: #FFA726;
      --error-color: #FF5252;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: var(--font-primary);
      color: var(--text-white);
      background: var(--deep-blue);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Arrière-plan animé */
    .bg-animation {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
      background: radial-gradient(ellipse at 50% 50%, #1a2a4a 0%, #080e1a 100%);
    }
    .stars {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
      background-image: radial-gradient(2px 2px at 20px 30px, rgba(212,175,55,0.4), transparent),
        radial-gradient(2px 2px at 40px 70px, rgba(212,175,55,0.3), transparent),
        radial-gradient(1px 1px at 90px 40px, #fff, transparent);
      background-size: 200px 200px; animation: starsMove 60s linear infinite;
    }
    @keyframes starsMove { from { transform: translateY(0); } to { transform: translateY(-200px); } }

    /* Carte de Statut */
    .status-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 40px;
      max-width: 500px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.5s ease-out;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    .status-icon-wrapper {
      width: 100px; height: 100px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 25px;
      font-size: 45px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
      transition: all 0.4s ease;
    }
    
    /* Couleurs dynamiques selon le statut */
    .status-icon-wrapper.pending { color: var(--warning-color); border-color: var(--warning-color); box-shadow: 0 0 30px rgba(255, 167, 38, 0.2); }
    .status-icon-wrapper.success { color: var(--success-color); border-color: var(--success-color); box-shadow: 0 0 30px rgba(76, 175, 80, 0.2); }
    .status-icon-wrapper.error { color: var(--error-color); border-color: var(--error-color); box-shadow: 0 0 30px rgba(255, 82, 82, 0.2); }

    h1 { font-family: var(--font-display); font-size: 1.8rem; margin-bottom: 15px; }
    p.message { color: var(--text-light); font-size: 1rem; line-height: 1.6; margin-bottom: 30px; }

    /* Zone des détails */
    .details-box {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 30px;
      text-align: left;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .detail-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.95rem; }
    .detail-row:last-child { margin-bottom: 0; }
    .detail-label { color: rgba(255, 255, 255, 0.5); }
    .detail-value { font-weight: 600; font-family: var(--font-display); color: var(--gold); }

    /* Boutons */
    .btn-verify {
      width: 100%;
      background: linear-gradient(135deg, var(--gold-deep), var(--gold));
      color: #080e1a;
      border: none;
      padding: 16px;
      border-radius: 50px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
      margin-bottom: 15px;
    }
    .btn-verify:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(212, 175, 55, 0.5); }
    .btn-verify:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    .btn-wallet {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      color: var(--text-light);
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.3s;
    }
    .btn-wallet:hover { color: var(--gold); }

    .loader {
      display: none; width: 20px; height: 20px;
      border: 3px solid rgba(8, 14, 26, 0.3);
      border-top-color: #080e1a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

  </style>
</head>
<body>
  <div class="bg-animation"></div>
  <div class="stars"></div>

  <div class="status-card">
    <div class="status-icon-wrapper pending" id="statusIcon">
      <i class="fas fa-hourglass-half"></i>
    </div>
    
    <h1 id="statusTitle">Paiement en attente</h1>
    <p class="message" id="statusMessage">Nous attendons la confirmation de l'opérateur. Vous pouvez vérifier le statut manuellement.</p>
    
    <div class="details-box">
      <div class="detail-row">
        <span class="detail-label">N° de Transaction</span>
        <span class="detail-value" id="txIdDisplay">...</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Montant</span>
        <span class="detail-value" id="amountDisplay">...</span>
      </div>
    </div>
    
    <button class="btn-verify" id="verifyBtn" onclick="verifyPayment()">
      <span class="loader" id="btnLoader"></span>
      <i class="fas fa-sync-alt" id="btnIcon"></i>
      <span id="btnText">Vérifier le statut maintenant</span>
    </button>
    
    <a href="wallet.html" class="btn-wallet">
      <i class="fas fa-arrow-left"></i>
      Retour au portefeuille
    </a>
  </div>

  <script>
    const BACKEND_URL = window.location.hostname.includes('replit')
      ? ''
      : 'https://social-boost-exaucenapopolo2.replit.app';

    // Récupération intelligente de l'ID de transaction
    const urlParams = new URLSearchParams(window.location.search);
    const txidFromUrl = urlParams.get('txid') || urlParams.get('transaction_id');
    const pendingPayment = localStorage.getItem('pendingPayment');
    
    let transactionId = txidFromUrl || (pendingPayment ? JSON.parse(pendingPayment).transactionId : null);
    let amount = pendingPayment ? JSON.parse(pendingPayment).amount : null;

    // Affichage initial
    if (transactionId) {
      document.getElementById('txIdDisplay').textContent = transactionId.substring(0, 15) + '...';
    } else {
      document.getElementById('txIdDisplay').textContent = 'Introuvable';
      updateUI('error', 'Erreur de lien', 'Aucune transaction trouvée. Veuillez vérifier votre portefeuille.');
      document.getElementById('verifyBtn').style.display = 'none';
    }

    if (amount) {
      document.getElementById('amountDisplay').textContent = Number(amount).toLocaleString('fr-FR') + ' FCFA';
    }

    // Fonction de mise à jour de l'interface visuelle
    function updateUI(status, title, message) {
      const iconWrapper = document.getElementById('statusIcon');
      const titleEl = document.getElementById('statusTitle');
      const messageEl = document.getElementById('statusMessage');
      
      iconWrapper.className = 'status-icon-wrapper ' + status;
      titleEl.textContent = title;
      messageEl.textContent = message;

      if (status === 'pending') {
        iconWrapper.innerHTML = '<i class="fas fa-hourglass-half"></i>';
      } else if (status === 'success') {
        iconWrapper.innerHTML = '<i class="fas fa-check-double"></i>';
      } else if (status === 'error') {
        iconWrapper.innerHTML = '<i class="fas fa-times"></i>';
      }
    }

    // Fonction déclenchée par le bouton
    async function verifyPayment() {
      if (!transactionId) return;

      const btn = document.getElementById('verifyBtn');
      const btnText = document.getElementById('btnText');
      const btnIcon = document.getElementById('btnIcon');
      const loader = document.getElementById('btnLoader');

      // État de chargement du bouton
      btn.disabled = true;
      btnText.textContent = "Vérification...";
      btnIcon.style.display = "none";
      loader.style.display = "block";

      try {
        // On interroge notre backend sécurisé qui contient la logique multi-langues
        const response = await fetch(`${BACKEND_URL}/api/confirm-swychr?transactionId=${transactionId}`);
        const data = await response.json();

        if (data.finalStatus === 'success') {
          updateUI('success', 'Paiement Réussi !', 'Votre solde a été mis à jour avec succès.');
          localStorage.removeItem('pendingPayment');
          btn.style.display = 'none'; // On cache le bouton car c'est fini
          
          // Redirection automatique optionnelle
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 4000);
          
        } else if (data.finalStatus === 'pending') {
          updateUI('pending', 'Toujours en cours', 'L\'opérateur traite toujours votre paiement. Réessayez dans un instant.');
          
        } else if (data.finalStatus === 'failed') {
          updateUI('error', 'Paiement échoué ou annulé', 'La transaction n\'a pas abouti. Aucun montant n\'a été débité de notre côté.');
          btn.style.display = 'none';
        }
      } catch (error) {
        updateUI('pending', 'Problème de réseau', 'Impossible de joindre le serveur. Veuillez réessayer.');
      } finally {
        // Restauration du bouton
        btn.disabled = false;
        btnText.textContent = "Revérifier le statut";
        btnIcon.style.display = "block";
        loader.style.display = "none";
      }
    }

    // Lancer une première vérification automatique si on vient de payer
    if (transactionId) {
      setTimeout(verifyPayment, 1000);
    }
  </script>
</body>
</html>
