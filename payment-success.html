<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"/>
  <title>Statut du Paiement · Social Boost Horizon</title>

  <!-- Google Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <style>
    /* Harmonisation avec ton design pro */
    :root {
      --deep-blue: #080e1a;
      --dark-blue: #0A162B;
      --gold: #D4AF37;
      --gold-deep: #B8860B;
      --glass-bg: rgba(15, 25, 45, 0.65);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-white: #FFFFFF;
      --text-light: rgba(255, 255, 255, 0.8);
      --font-primary: 'Plus Jakarta Sans', sans-serif;
      --font-display: 'Space Grotesk', sans-serif;
      --success-color: #4CAF50;
      --warning-color: #FFA726;
      --error-color: #FF5252;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: var(--font-primary);
      color: var(--text-white);
      background: var(--deep-blue);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Arrière-plan animé */
    .bg-animation {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
      background: radial-gradient(ellipse at 50% 50%, #1a2a4a 0%, #080e1a 100%);
    }
    .stars {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
      background-image: radial-gradient(2px 2px at 20px 30px, rgba(212,175,55,0.4), transparent),
        radial-gradient(2px 2px at 40px 70px, rgba(212,175,55,0.3), transparent),
        radial-gradient(1px 1px at 90px 40px, #fff, transparent);
      background-size: 200px 200px; animation: starsMove 60s linear infinite;
    }
    @keyframes starsMove { from { transform: translateY(0); } to { transform: translateY(-200px); } }

    /* Carte de Statut */
    .status-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 40px;
      max-width: 500px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.5s ease-out;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    .status-icon-wrapper {
      width: 100px; height: 100px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 25px;
      font-size: 45px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
      transition: all 0.4s ease;
    }
    
    /* Couleurs dynamiques selon le statut */
    .status-icon-wrapper.pending { color: var(--warning-color); border-color: var(--warning-color); box-shadow: 0 0 30px rgba(255, 167, 38, 0.2); }
    .status-icon-wrapper.success { color: var(--success-color); border-color: var(--success-color); box-shadow: 0 0 30px rgba(76, 175, 80, 0.2); }
    .status-icon-wrapper.error { color: var(--error-color); border-color: var(--error-color); box-shadow: 0 0 30px rgba(255, 82, 82, 0.2); }

    h1 { font-family: var(--font-display); font-size: 1.8rem; margin-bottom: 15px; }
    p.message { color: var(--text-light); font-size: 1rem; line-height: 1.6; margin-bottom: 30px; }

    /* Zone des détails */
    .details-box {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 30px;
      text-align: left;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .detail-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.95rem; }
    .detail-row:last-child { margin-bottom: 0; }
    .detail-label { color: rgba(255, 255, 255, 0.5); }
    .detail-value { font-weight: 600; font-family: var(--font-display); color: var(--gold); }

    /* Boutons */
    .btn-verify {
      width: 100%;
      background: linear-gradient(135deg, var(--gold-deep), var(--gold));
      color: #080e1a;
      border: none;
      padding: 16px;
      border-radius: 50px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
      margin-bottom: 15px;
    }
    .btn-verify:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(212, 175, 55, 0.5); }
    .btn-verify:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    .btn-wallet {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      color: var(--text-light);
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.3s;
    }
    .btn-wallet:hover { color: var(--gold); }

    .loader {
      display: none; width: 20px; height: 20px;
      border: 3px solid rgba(8, 14, 26, 0.3);
      border-top-color: #080e1a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

  </style>
</head>
<body>
  <div class="bg-animation"></div>
  <div class="stars"></div>

  <div class="status-card">
    <div class="status-icon-wrapper pending" id="statusIcon">
      <i class="fas fa-hourglass-half"></i>
    </div>
    
    <h1 id="statusTitle">Paiement en attente</h1>
    <p class="message" id="statusMessage">Nous attendons la confirmation de l'opérateur. Vous pouvez vérifier le statut manuellement.</p>
    
    <div class="details-box">
      <div class="detail-row">
        <span class="detail-label">N° de Transaction</span>
        <span class="detail-value" id="txIdDisplay">...</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Fournisseur</span>
        <span class="detail-value" id="providerDisplay">Détection...</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Montant</span>
        <span class="detail-value" id="amountDisplay">...</span>
      </div>
    </div>
    
    <button class="btn-verify" id="verifyBtn" onclick="verifyPayment()">
      <span class="loader" id="btnLoader"></span>
      <i class="fas fa-sync-alt" id="btnIcon"></i>
      <span id="btnText">Vérifier le statut maintenant</span>
    </button>
    
    <a href="wallet.html" class="btn-wallet">
      <i class="fas fa-arrow-left"></i>
      Retour au portefeuille
    </a>
  </div>

  <!-- Scripts Firebase pour la vérification Fapshi -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    const BACKEND_URL = 'https://socialboosthorizon.com';

    // ── 1. Initialisation de Firebase ─────────────────────────────
    const firebaseConfig = {
      apiKey:            "AIzaSyD2JiDS0g8EkeNXxjO7_wGI3WznpPvcCCk",
      authDomain:        "social-boost-horizon.firebaseapp.com",
      projectId:         "social-boost-horizon",
      storageBucket:     "social-boost-horizon.appspot.com",
      messagingSenderId: "43658165639",
      appId:             "1:43658165639:web:b8f492dc6a25cd12fc6722"
    };
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    auth.onAuthStateChanged(user => {
      currentUser = user;
    });

    // ── 2. Récupération intelligente des données ──────────────────
    const urlParams = new URLSearchParams(window.location.search);
    
    // Fapshi utilise souvent transId, Swychr utilise txid ou transaction_id
    const transIdFromUrl = urlParams.get('transId');
    const txidFromUrl = urlParams.get('txid') || urlParams.get('transaction_id');
    const pendingPaymentStr = localStorage.getItem('pendingPayment');
    const pendingPayment = pendingPaymentStr ? JSON.parse(pendingPaymentStr) : null;
    
    let transactionId = transIdFromUrl || txidFromUrl || (pendingPayment ? pendingPayment.transactionId : null);
    let amount = pendingPayment ? pendingPayment.amount : null;
    let provider = 'swychr'; // Par défaut

    // Détermination du fournisseur
    if (transIdFromUrl) {
      provider = 'fapshi';
    } else if (pendingPayment && pendingPayment.provider) {
      provider = pendingPayment.provider;
    } else if (transactionId && transactionId.length > 25) {
      // Les identifiants très longs sont souvent ceux générés par notre Firestore pour Fapshi
      provider = 'fapshi';
    }

    // ── 3. Affichage initial ───────────────────────────────────────
    if (transactionId) {
      document.getElementById('txIdDisplay').textContent = transactionId.substring(0, 15) + '...';
      document.getElementById('providerDisplay').textContent = provider === 'fapshi' ? 'Fapshi (Cameroun)' : 'Swychr (International)';
    } else {
      document.getElementById('txIdDisplay').textContent = 'Introuvable';
      document.getElementById('providerDisplay').textContent = 'Inconnu';
      updateUI('error', 'Erreur de lien', 'Aucune transaction trouvée. Veuillez vérifier votre portefeuille.');
      document.getElementById('verifyBtn').style.display = 'none';
    }

    if (amount) {
      document.getElementById('amountDisplay').textContent = Number(amount).toLocaleString('fr-FR') + ' FCFA';
    } else {
      document.getElementById('amountDisplay').textContent = '---';
    }

    // ── 4. Fonction de mise à jour de l'interface visuelle ────────
    function updateUI(status, title, message) {
      const iconWrapper = document.getElementById('statusIcon');
      const titleEl = document.getElementById('statusTitle');
      const messageEl = document.getElementById('statusMessage');
      
      iconWrapper.className = 'status-icon-wrapper ' + status;
      titleEl.textContent = title;
      messageEl.textContent = message;

      if (status === 'pending') {
        iconWrapper.innerHTML = '<i class="fas fa-hourglass-half"></i>';
      } else if (status === 'success') {
        iconWrapper.innerHTML = '<i class="fas fa-check-double"></i>';
      } else if (status === 'error') {
        iconWrapper.innerHTML = '<i class="fas fa-times"></i>';
      }
    }

    // Fonction utilitaire pour réinitialiser le bouton
    function resetBtnState() {
      const btn = document.getElementById('verifyBtn');
      const btnText = document.getElementById('btnText');
      const btnIcon = document.getElementById('btnIcon');
      const loader = document.getElementById('btnLoader');

      btn.disabled = false;
      btnText.textContent = "Revérifier le statut";
      btnIcon.style.display = "block";
      loader.style.display = "none";
    }

    // ── 5. Logique de vérification (Swychr et Fapshi) ──────────────
    async function verifyPayment() {
      if (!transactionId) return;

      const btn = document.getElementById('verifyBtn');
      const btnText = document.getElementById('btnText');
      const btnIcon = document.getElementById('btnIcon');
      const loader = document.getElementById('btnLoader');

      // État de chargement du bouton
      btn.disabled = true;
      btnText.textContent = "Vérification...";
      btnIcon.style.display = "none";
      loader.style.display = "block";

      try {
        if (provider === 'swychr') {
          // --- LOGIQUE SWYCHR ---
          const response = await fetch(`${BACKEND_URL}/api/confirm-swychr?transactionId=${transactionId}`);
          const data = await response.json();

          if (data.finalStatus === 'success') {
            handleSuccess();
          } else if (data.finalStatus === 'pending') {
            handlePending();
          } else if (data.finalStatus === 'failed') {
            handleError();
          }

        } else if (provider === 'fapshi') {
          // --- LOGIQUE FAPSHI ---
          if (!currentUser) {
            // S'il n'est pas encore connecté, on donne un peu de temps à Firebase
            await new Promise(r => setTimeout(r, 1000));
            if (!auth.currentUser) {
              updateUI('pending', 'Authentification requise', 'Veuillez patienter pendant la vérification de votre compte...');
              resetBtnState();
              return;
            }
          }

          let dbStatus = 'PENDING';
          
          // On cherche la transaction dans la collection fapshiTransactions
          // D'abord on essaie de chercher par ID de document
          const docRef = await db.collection('fapshiTransactions').doc(transactionId).get();
          
          if (docRef.exists) {
            dbStatus = docRef.data().status || 'PENDING';
          } else {
            // Si l'ID était stocké dans le champ 'fapshiTransId' plutôt que l'ID du document
            const snapshot = await db.collection('fapshiTransactions').where('fapshiTransId', '==', transactionId).get();
            if (!snapshot.empty) {
              dbStatus = snapshot.docs[0].data().status || 'PENDING';
            }
          }

          // Dictionnaire bilingue pour être sûr d'attraper le bon statut
          const upperStatus = dbStatus.toUpperCase();
          const successStatuses = ['SUCCESSFUL', 'CONFIRMED', 'SUCCESS', 'RÉUSSI', 'REUSSI', 'COMPLETED'];
          const failedStatuses = ['FAILED', 'ÉCHOUÉ', 'ECHOUE', 'ANNULÉ', 'ANNULE', 'CANCELED', 'CANCELLED', 'EXPIRED'];

          if (successStatuses.includes(upperStatus)) {
            handleSuccess();
          } else if (failedStatuses.includes(upperStatus)) {
            handleError();
          } else {
            handlePending();
          }
        }
      } catch (error) {
        console.error("Erreur de vérification :", error);
        updateUI('pending', 'Problème de réseau', 'Impossible de joindre le serveur. Veuillez réessayer.');
      } finally {
        // Restauration du bouton uniquement si ce n'est pas un succès
        const iconWrapper = document.getElementById('statusIcon');
        if (!iconWrapper.classList.contains('success') && !iconWrapper.classList.contains('error')) {
          resetBtnState();
        }
      }
    }

    // Fonctions d'aide pour les actions récurrentes
    function handleSuccess() {
      updateUI('success', 'Paiement Réussi !', 'Votre solde a été mis à jour avec succès.');
      localStorage.removeItem('pendingPayment');
      document.getElementById('verifyBtn').style.display = 'none';
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 4000);
    }

    function handlePending() {
      updateUI('pending', 'Toujours en cours', 'L\'opérateur traite toujours votre paiement. Réessayez dans un instant.');
    }

    function handleError() {
      updateUI('error', 'Paiement échoué ou annulé', 'La transaction n\'a pas abouti. Aucun montant n\'a été débité de notre côté.');
      document.getElementById('verifyBtn').style.display = 'none';
    }

    // Lancer une première vérification automatique avec un léger délai
    if (transactionId) {
      setTimeout(verifyPayment, 1500);
    }
  </script>
</body>
</html>
