<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paiement en cours - Social Boost Horizon</title>
  <style>
    /* --- LE DESIGN MAGNIFIQUE (issu de success.html) --- */
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #1a1a2e; 
        color: #e0e0e0; 
        margin: 0; padding: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        min-height: 100vh; position: relative; overflow: hidden; text-align: center;
    }

    h1 { color: #4CAF50; margin-bottom: 10px; font-size: 2.2em; font-weight: 600; }
    p { color: #81D4FA; margin-bottom: 20px; font-size: 1.1em; line-height: 1.6; max-width: 600px; padding: 0 20px; }

    /* L'affichage du montant */
    .amount-display {
        font-size: 2.5rem; font-weight: 700; color: #fff; margin: 15px 0;
        text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    .amount-display span { font-size: 1.2rem; color: #BBDEFB; }

    /* Zone de statut de vérification */
    .status-box {
        background: rgba(20, 35, 60, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 15px; padding: 20px; margin: 20px 0;
        min-width: 300px; max-width: 90%;
    }

    .status-text { font-size: 1em; margin-top: 10px; font-weight: bold; }
    .status-pending { color: #FFC107; }
    .status-success { color: #4CAF50; }
    .status-error { color: #FF5252; }

    /* Boutons */
    .btn-group { display: flex; gap: 15px; margin-top: 15px; flex-wrap: wrap; justify-content: center; }
    .btn {
        text-decoration: none; padding: 12px 24px; border-radius: 8px; font-weight: bold;
        transition: all 0.3s ease; display: inline-flex; align-items: center; cursor: pointer;
        font-size: 1em; border: none; outline: none;
    }
    .btn-primary { background-color: #4DA6FF; color: #fff; }
    .btn-primary:hover { background-color: #1E90FF; transform: translateY(-2px); }
    .btn-secondary { background-color: transparent; color: #BBDEFB; border: 2px solid #BBDEFB; }
    .btn-secondary:hover { background-color: rgba(187, 222, 251, 0.1); }

    /* Animations de chargement et d'icônes */
    .icon { margin-right: 8px; font-size: 1.2em; }
    .fa-spin { animation: fa-spin 2s infinite linear; }
    @keyframes fa-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(359deg); } }

    /* --- ANIMATIONS DE FOND (Particules) --- */
    .background-animation {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; opacity: 0.4; z-index: -1;
    }
    .particle {
        position: absolute; background: radial-gradient(circle, #2196F3 0%, transparent 70%);
        border-radius: 50%; animation: moveParticle linear infinite;
    }
    @keyframes moveParticle {
        0% { transform: translate(0, 0) scale(0.5); opacity: 0; }
        25% { opacity: 1; }
        100% { transform: translate(var(--x), var(--y)) scale(1.5); opacity: 0; }
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

  <div class="background-animation" id="backgroundAnimation"></div>

  <h1 id="mainTitle"><i class="fas fa-sync fa-spin icon" id="titleIcon"></i>Traitement en cours...</h1>
  <p>Merci d'avoir initié votre paiement. Nous interrogeons l'opérateur pour valider votre transaction.</p>
  
  <div class="amount-display" id="amountDisplay"></div>
  
  <div class="status-box" id="statusBox">
    <div id="statusIconContainer"><i class="fas fa-spinner fa-spin fa-2x" style="color: #4DA6FF;"></i></div>
    <div class="status-text status-pending" id="statusText">Vérification de votre paiement en arrière-plan...</div>
    <div id="countdownText" style="color:rgba(255,255,255,0.7); font-size:0.9em; margin-top:10px; display:none;"></div>
  </div>

  <div class="btn-group">
    <button id="verifyBtn" class="btn btn-primary" onclick="manualCheck()" style="display: none;">
      <i class="fas fa-redo icon"></i> Revérifier
    </button>
    <a href="dashboard.html" class="btn btn-secondary" id="dashboardBtn">
      <i class="fas fa-home icon"></i>Aller au tableau de bord
    </a>
  </div>

  <script>
    // --- 1. CONFIGURATION ---
    // Ton URL Backend (ajustée selon l'environnement)
    const BACKEND_URL = window.location.hostname.includes('replit')
      ? ''
      : 'https://social-boost-exaucenapopolo2.replit.app';

    let currentTransactionId = null;
    let isChecking = false;

    // --- 2. RÉCUPÉRATION DES DONNÉES (L'intelligence de ton fichier actuel) ---
    // On cherche d'abord dans l'URL, puis dans le stockage local
    const urlParams = new URLSearchParams(window.location.search);
    const txidFromUrl = urlParams.get('txid');

    const pendingPayment = localStorage.getItem('pendingPayment');
    const txidFromStorage = pendingPayment ? JSON.parse(pendingPayment).transactionId : null;
    const amountFromStorage = pendingPayment ? JSON.parse(pendingPayment).amount : null;

    currentTransactionId = txidFromUrl || txidFromStorage;

    // Affichage du montant s'il est connu
    if (amountFromStorage) {
      document.getElementById('amountDisplay').innerHTML = `${Number(amountFromStorage).toLocaleString('fr-FR')} <span>FCFA</span>`;
    }

    // Lancement automatique si on a un ID
    if (currentTransactionId) {
      autoCheckPaymentStatus(currentTransactionId);
    } else {
      showError("Aucun paiement en attente trouvé sur cet appareil.");
    }

    // --- 3. FONCTION DE VÉRIFICATION AUTOMATIQUE EN BOUCLE ---
    async function autoCheckPaymentStatus(transactionId) {
      let attempts = 0;
      const maxAttempts = 15; // On essaiera 15 fois (environ 45 secondes)

      const check = async () => {
        if (isChecking) return;
        isChecking = true;

        try {
          // On appelle l'API que nous avons corrigée précédemment
          const response = await fetch(`${BACKEND_URL}/api/confirm-swychr?transactionId=${transactionId}`);
          const data = await response.json();

          if (data.isPaid) {
            handleSuccess();
            return; // On arrête la boucle !
          }

          // Si ce n'est pas encore payé, on réessaie
          attempts++;
          if (attempts < maxAttempts) {
            document.getElementById('statusText').innerHTML = `En attente de l'opérateur... (Essai ${attempts}/${maxAttempts})`;
            setTimeout(() => { isChecking = false; check(); }, 3000); // Attend 3s puis recommence
          } else {
            // Après trop d'essais, on propose un bouton manuel
            showTimeout();
          }
        } catch (error) {
          console.error('Erreur vérification:', error);
          attempts++;
          if (attempts < maxAttempts) {
            setTimeout(() => { isChecking = false; check(); }, 5000); // Attend 5s en cas d'erreur
          } else {
            showTimeout();
          }
        }
      };

      check(); // Démarrage de la boucle
    }

    // --- 4. ACTIONS D'INTERFACE ---

    function handleSuccess() {
      // Met à jour le texte et les icônes
      document.getElementById('statusIconContainer').innerHTML = '<i class="fas fa-check-circle fa-3x" style="color: #4CAF50;"></i>';
      const statusText = document.getElementById('statusText');
      statusText.textContent = 'Paiement confirmé ! Votre solde a été mis à jour.';
      statusText.className = 'status-text status-success';
      
      document.getElementById('mainTitle').innerHTML = '<i class="fas fa-check-double icon"></i>Paiement Réussi !';
      document.getElementById('verifyBtn').style.display = 'none';

      // Nettoyage de la mémoire locale
      localStorage.removeItem('pendingPayment');

      // Redirection automatique
      let countdown = 3;
      const countdownEl = document.getElementById('countdownText');
      countdownEl.style.display = 'block';
      countdownEl.textContent = `Redirection vers le tableau de bord dans ${countdown}s...`;

      const timer = setInterval(() => {
        countdown--;
        if (countdown > 0) {
          countdownEl.textContent = `Redirection vers le tableau de bord dans ${countdown}s...`;
        } else {
          clearInterval(timer);
          window.location.href = 'dashboard.html';
        }
      }, 1000);
    }

    function showTimeout() {
      isChecking = false;
      document.getElementById('statusIconContainer').innerHTML = '<i class="fas fa-clock fa-3x" style="color: #FFC107;"></i>';
      const statusText = document.getElementById('statusText');
      statusText.textContent = "L'opérateur prend plus de temps que prévu. Votre solde sera mis à jour dès qu'ils confirmeront.";
      statusText.className = 'status-text status-pending';
      
      // On affiche le bouton pour que l'utilisateur puisse revérifier lui-même
      document.getElementById('verifyBtn').style.display = 'inline-flex';
    }

    function showError(message) {
      document.getElementById('statusIconContainer').innerHTML = '<i class="fas fa-exclamation-triangle fa-3x" style="color: #FF5252;"></i>';
      const statusText = document.getElementById('statusText');
      statusText.textContent = message;
      statusText.className = 'status-text status-error';
      document.getElementById('mainTitle').innerHTML = '<i class="fas fa-times-circle icon"></i>Erreur';
    }

    // --- 5. VÉRIFICATION MANUELLE (Bouton Revérifier) ---
    function manualCheck() {
      if (currentTransactionId) {
        document.getElementById('statusIconContainer').innerHTML = '<i class="fas fa-spinner fa-spin fa-2x" style="color: #4DA6FF;"></i>';
        document.getElementById('statusText').textContent = "Nouvelle vérification en cours...";
        document.getElementById('statusText').className = 'status-text status-pending';
        document.getElementById('verifyBtn').style.display = 'none';
        isChecking = false;
        autoCheckPaymentStatus(currentTransactionId); // On relance la boucle !
      }
    }

    // --- 6. PARTICULES DE FOND (Garde ton beau design animé) ---
    const backgroundAnimation = document.getElementById('backgroundAnimation');
    for (let i = 0; i < 25; i++) {
      const particle = document.createElement('div');
      particle.classList.add('particle');
      const size = Math.random() * 10 + 5; 
      particle.style.width = `${size}px`;
      particle.style.height = `${size}px`;
      particle.style.left = `${Math.random() * 100}vw`;
      particle.style.top = `${Math.random() * 100}vh`;
      particle.style.setProperty('--x', (Math.random() - 0.5) * 400 + 'vw');
      particle.style.setProperty('--y', (Math.random() - 0.5) * 400 + 'vh');
      particle.style.animationDuration = `${Math.random() * 15 + 10}s`; 
      particle.style.animationDelay = `-${Math.random() * 10}s`; 
      backgroundAnimation.appendChild(particle);
    }
  </script>
</body>
</html>
