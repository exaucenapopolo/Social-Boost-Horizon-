<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gestion de ma Boutique - Social Boost Horizon</title>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <style>
    :root {
      --bg-main: #06060A;
      --bg-card: #111122;
      --text-main: #FFFFFF;
      --text-muted: rgba(255, 255, 255, 0.6);
      --accent-primary: #F0A500; 
      --border-color: rgba(255, 255, 255, 0.1);
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      background-color: var(--bg-main); color: var(--text-main);
      margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden;
    }

    header {
      background: rgba(8, 8, 18, 0.9); backdrop-filter: blur(10px);
      padding: 1rem; border-bottom: 1px solid var(--border-color);
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 100;
    }
    
    .header-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 700; }

    .dashboard-container {
      display: flex; flex-direction: row; gap: 2rem;
      max-width: 1200px; margin: 2rem auto; padding: 0 1rem;
    }

    /* Formulaire */
    .form-section { flex: 1; min-width: 0; }
    .card {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: 16px; padding: 2rem;
    }

    h2 { font-family: 'Space Grotesk', sans-serif; margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; font-size: 1.3rem;}

    .form-row { display: flex; gap: 15px; flex-wrap: wrap; }
    .form-group { margin-bottom: 1.5rem; flex: 1; min-width: 200px; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: var(--text-muted); font-weight: 600; }
    .form-control {
      width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--border-color);
      background: rgba(0, 0, 0, 0.3); color: var(--text-main); font-family: inherit; font-size: 0.95rem;
    }
    .form-control:focus { outline: none; border-color: var(--accent-primary); }
    
    input[type="color"] { padding: 5px; height: 45px; cursor: pointer; }

    .btn {
      padding: 12px 20px; border-radius: 8px; font-weight: 600; cursor: pointer;
      border: none; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      text-decoration: none; transition: 0.2s; width: 100%;
    }
    .btn-primary { background: var(--accent-primary); color: #000; }
    .btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); width: auto;}
    .btn-publish { background: #0FB5A6; color: #000; margin-top: 10px; }
    .btn-disabled { opacity: 0.5; pointer-events: none; }

    .upload-area {
      border: 2px dashed var(--border-color); border-radius: 8px; padding: 1.5rem; text-align: center; cursor: pointer; background: rgba(255,255,255,0.02);
    }
    .upload-status { font-size: 0.8rem; margin-top: 10px; color: var(--accent-primary); }

    /* Aperçu Mobile Réactif */
    .preview-section { width: 340px; position: sticky; top: 80px; }
    .preview-title { text-align: center; color: var(--text-muted); font-size: 1rem; margin-top:0; margin-bottom: 15px;}
    
    .phone-mockup {
      width: 100%; height: 650px; border: 10px solid #1a1a2e; border-radius: 40px;
      background: var(--pv-bg, #F8F9FA); overflow-y: auto; position: relative;
      color: var(--pv-text, #212529); transition: all 0.3s ease;
    }
    .phone-mockup::-webkit-scrollbar { display: none; }
    
    .pv-header { padding: 30px 20px 20px; text-align: center; border-bottom: 1px solid rgba(128,128,128,0.2); }
    .pv-logo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 3px solid var(--pv-accent, #F0A500); margin-bottom: 10px; display: none; }
    .pv-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; margin: 0; font-weight: 700; }
    .pv-slogan { font-size: 0.8rem; opacity: 0.7; margin-top: 5px; }
    .pv-desc { font-size: 0.85rem; padding: 15px; text-align: center; opacity: 0.8; }
    
    .pv-services { padding: 15px; }
    .pv-service-card {
      background: var(--pv-card, #FFFFFF); border: 1px solid rgba(128,128,128,0.2);
      border-radius: 10px; padding: 15px; margin-bottom: 12px;
    }
    .pv-service-price { color: var(--pv-accent, #F0A500); font-weight: 700; font-size: 1.1rem; }
    .mockup-btn {
      margin-top: 10px; width: 100%; padding: 8px; border-radius: 6px; border: none;
      background: var(--pv-accent, #F0A500); color: #fff; font-weight: 600;
    }

    .status-banner {
      background: rgba(15, 181, 166, 0.1); border: 1px solid #0FB5A6; padding: 15px; border-radius: 8px;
      margin-bottom: 20px; display: none; flex-direction: column; gap: 10px;
    }
    .store-link-box {
      background: rgba(0,0,0,0.5); padding: 10px; border-radius: 6px; display: flex; gap: 10px; color: #0FB5A6; font-family: monospace;
    }

    #globalLoader { text-align: center; padding: 5rem; color: var(--accent-primary); }
    #mainContent { display: none; }

    /* Rendre le layout parfait sur mobile */
    @media (max-width: 850px) {
      .dashboard-container { flex-direction: column; align-items: center; }
      .form-section { width: 100%; }
      .preview-section { width: 100%; max-width: 360px; position: static; margin-top: 2rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-title"><i class="fas fa-store"></i> Gestion Boutique</div>
    <a href="dashboard.html" class="btn btn-outline" style="padding: 6px 12px;"><i class="fas fa-arrow-left"></i> Retour</a>
  </header>

  <div id="globalLoader"><i class="fas fa-circle-notch fa-spin fa-2x"></i></div>

  <div id="mainContent" class="dashboard-container">
    
    <div class="form-section">
      <div class="card">
        <div id="statusBanner" class="status-banner">
          <h3 style="margin:0; font-size: 1rem; color: #0FB5A6;"><i class="fas fa-check-circle"></i> Boutique En Ligne</h3>
          <div class="store-link-box">
            <span id="storeLinkDisplay" style="flex:1; overflow:hidden; text-overflow:ellipsis;"></span>
            <button class="btn btn-primary" style="width:auto; padding: 5px 10px;" onclick="copyLink()"><i class="fas fa-copy"></i></button>
          </div>
        </div>

        <h2>Configuration</h2>
        <form id="storeForm">
          
          <div class="form-group">
            <label>Nom de l'Agence *</label>
            <input type="text" id="storeName" class="form-control" placeholder="Digital Boost" required oninput="updatePreview()">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Slogan</label>
              <input type="text" id="storeSlogan" class="form-control" placeholder="Votre visibilité..." oninput="updatePreview()">
            </div>
            <div class="form-group">
              <label>Numéro WhatsApp (Commandes) *</label>
              <input type="tel" id="storeWa" class="form-control" placeholder="+237600000000" required>
            </div>
          </div>

          <div class="form-group">
            <label>Description</label>
            <textarea id="storeDesc" class="form-control" rows="2" oninput="updatePreview()"></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Couleur Principale</label>
              <input type="color" id="storeColor" class="form-control" value="#F0A500" oninput="updatePreview()">
            </div>
            <div class="form-group">
              <label>Thème de la boutique</label>
              <select id="storeTheme" class="form-control" onchange="updatePreview()">
                <option value="light">Clair (Blanc)</option>
                <option value="dark">Sombre (Noir)</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Logo de la boutique</label>
            <input type="file" id="logoUpload" accept="image/*" style="display: none;">
            <div class="upload-area" onclick="document.getElementById('logoUpload').click()">
              <i class="fas fa-image fa-2x" style="color: gray;"></i>
              <p style="margin: 5px 0 0; font-size: 0.85rem;">Choisir un logo</p>
            </div>
            <div id="uploadStatus" class="upload-status"></div>
            <input type="hidden" id="logoUrl">
          </div>

          <button type="button" id="btnSaveDraft" class="btn btn-primary" onclick="saveStore(false)">
            <i class="fas fa-save"></i> Enregistrer les modifications
          </button>
          <button type="button" id="btnPublish" class="btn btn-publish" style="display: none;" onclick="publishStore()">
            <i class="fas fa-globe"></i> Publier en ligne
          </button>
        </form>
      </div>
    </div>

    <div class="preview-section">
      <h3 class="preview-title"><i class="fas fa-eye"></i> Aperçu Client</h3>
      <div class="phone-mockup" id="phoneMockup">
        <div class="pv-header" id="pvHeader">
          <img id="pvLogo" class="pv-logo" src="">
          <h1 id="pvTitle" class="pv-title">Nom</h1>
          <div id="pvSlogan" class="pv-slogan">Slogan</div>
        </div>
        <div id="pvDesc" class="pv-desc">Description</div>
        <div class="pv-services">
          <div class="pv-service-card" id="pvCardMock">
            <div style="font-weight: 600; font-size: 0.9rem;">Exemple de Service</div>
            <div class="pv-service-price" id="pvPrice">1000 FCFA</div>
            <button class="mockup-btn" id="pvBtn">Commander via WhatsApp</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // Configuration Firebase... (Remets tes identifiants exacts)
    const firebaseConfig = {
      apiKey: "AIzaSyD2JiDS0g8EkeNXxjO7_wGI3WznpPvcCCk",
      authDomain: "social-boost-horizon.firebaseapp.com",
      projectId: "social-boost-horizon",
      storageBucket: "social-boost-horizon.appspot.com",
      messagingSenderId: "43658165639",
      appId: "1:43658165639:web:b8f492dc6a25cd12fc6722"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let currentUser = null;
    let currentStoreId = null;
    let pendingImageFile = null;

    auth.onAuthStateChanged(async (user) => {
      if (user) {
        currentUser = user;
        const userDoc = await db.collection('users').doc(user.uid).get();
        if(userDoc.exists) {
          const userData = userDoc.data();
          if(userData.storeId) {
            currentStoreId = userData.storeId;
            await loadExistingStore();
          }
          document.getElementById('globalLoader').style.display = 'none';
          document.getElementById('mainContent').style.display = 'flex';
          updatePreview();
        }
      } else { window.location.href = "login.html"; }
    });

    document.getElementById('logoUpload').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      pendingImageFile = file;
      document.getElementById('pvLogo').src = URL.createObjectURL(file);
      document.getElementById('pvLogo').style.display = 'inline-block';
      document.getElementById('uploadStatus').innerHTML = 'Image prête à être enregistrée.';
    });

    function updatePreview() {
      const name = document.getElementById('storeName').value || "Nom";
      const theme = document.getElementById('storeTheme').value;
      const color = document.getElementById('storeColor').value;
      
      document.getElementById('pvTitle').innerText = name;
      document.getElementById('pvSlogan').innerText = document.getElementById('storeSlogan').value;
      document.getElementById('pvDesc').innerText = document.getElementById('storeDesc').value;

      // Appliquer les couleurs CSS au téléphone
      const mockup = document.getElementById('phoneMockup');
      mockup.style.setProperty('--pv-accent', color);
      
      if(theme === 'dark') {
        mockup.style.setProperty('--pv-bg', '#111122');
        mockup.style.setProperty('--pv-text', '#ffffff');
        mockup.style.setProperty('--pv-card', '#1a1a2e');
      } else {
        mockup.style.setProperty('--pv-bg', '#F8F9FA');
        mockup.style.setProperty('--pv-text', '#212529');
        mockup.style.setProperty('--pv-card', '#FFFFFF');
      }
    }

    async function saveStore(isPublishing = false) {
      if(!document.getElementById('storeName').value) return alert("Le nom est requis.");
      if(!document.getElementById('storeWa').value) return alert("Le numéro WhatsApp est requis pour recevoir les commandes.");

      const btn = document.getElementById('btnSaveDraft');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enregistrement...';
      btn.classList.add('btn-disabled');

      let finalLogoUrl = document.getElementById('logoUrl').value;

      try {
        if (pendingImageFile) {
          document.getElementById('uploadStatus').innerText = 'Envoi image...';
          const fd = new FormData(); fd.append("file", pendingImageFile); fd.append("upload_preset", "afrikdigitalo_upload");
          const res = await fetch("https://api.cloudinary.com/v1_1/do83voiqy/image/upload", { method: "POST", body: fd });
          const data = await res.json();
          if (data.secure_url) { finalLogoUrl = data.secure_url; document.getElementById('logoUrl').value = finalLogoUrl; pendingImageFile = null; }
        }

        const storeData = {
          ownerId: currentUser.uid,
          name: document.getElementById('storeName').value,
          slogan: document.getElementById('storeSlogan').value,
          description: document.getElementById('storeDesc').value,
          whatsapp: document.getElementById('storeWa').value,
          themeColor: document.getElementById('storeColor').value,
          themeMode: document.getElementById('storeTheme').value,
          logoUrl: finalLogoUrl,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        if(!currentStoreId) {
          storeData.status = "draft";
          const newDoc = await db.collection('stores').add(storeData);
          currentStoreId = newDoc.id;
          await db.collection('users').doc(currentUser.uid).update({ storeId: currentStoreId });
          alert("Boutique créée !");
        } else {
          if(isPublishing) storeData.status = "published";
          await db.collection('stores').doc(currentStoreId).update(storeData);
          if(!isPublishing) alert("Enregistré !");
        }

        document.getElementById('btnPublish').style.display = 'block';
        if(storeData.status === "published") showLink();

      } catch (e) { alert("Erreur de sauvegarde."); }
      finally { btn.innerHTML = '<i class="fas fa-save"></i> Enregistrer'; btn.classList.remove('btn-disabled'); }
    }

    async function publishStore() {
      if(!currentStoreId) return alert("Enregistrez d'abord.");
      if(!confirm("Publier la boutique en ligne ?")) return;
      
      const link = `https://socialboosthorizon.com/boutique.html?id=${currentStoreId}`;
      await db.collection('stores').doc(currentStoreId).update({ status: "published", storeUrl: link });
      alert("Publié avec succès !");
      showLink(link);
    }

    async function loadExistingStore() {
      const doc = await db.collection('stores').doc(currentStoreId).get();
      if(doc.exists) {
        const d = doc.data();
        document.getElementById('storeName').value = d.name || "";
        document.getElementById('storeSlogan').value = d.slogan || "";
        document.getElementById('storeDesc').value = d.description || "";
        document.getElementById('storeWa').value = d.whatsapp || "";
        document.getElementById('storeColor').value = d.themeColor || "#F0A500";
        document.getElementById('storeTheme').value = d.themeMode || "light";
        if(d.logoUrl) {
          document.getElementById('logoUrl').value = d.logoUrl;
          document.getElementById('pvLogo').src = d.logoUrl;
          document.getElementById('pvLogo').style.display = 'inline-block';
        }
        document.getElementById('btnPublish').style.display = 'block';
        if(d.status === "published") showLink(d.storeUrl);
      }
    }

    function showLink(url) {
      if(!url) url = `https://socialboosthorizon.com/boutique.html?id=${currentStoreId}`;
      document.getElementById('statusBanner').style.display = 'flex';
      document.getElementById('storeLinkDisplay').innerText = url;
    }

    function copyLink() {
      navigator.clipboard.writeText(document.getElementById('storeLinkDisplay').innerText);
      alert("Lien copié !");
    }
  </script>
</body>
</html>
